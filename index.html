<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZM FLIX PRO</title>

<style>
body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);
transition:.3s;
}

header h2{margin:0;}

#search{
background:rgba(255,255,255,.1);
border:none;
padding:8px;
color:white;
border-radius:4px;
}

/* HERO */
.hero{
height:90vh;
position:relative;
display:flex;
align-items:flex-end;
padding:40px;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#141414,transparent),
linear-gradient(to right,#000000cc,transparent);
}

.heroContent{
z-index:2;
max-width:500px;
}

.playBtn,.infoBtn{
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

.playBtn{background:white;color:black;}
.infoBtn{background:rgba(109,109,110,0.7);}

/* ROW */
.section{padding:20px;}
.row{
display:flex;
gap:10px;
overflow-x:auto;
}
.row::-webkit-scrollbar{display:none;}

/* CARD */
.card{
min-width:150px;
height:220px;
background:#000;
border-radius:6px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:.3s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card:hover{
transform:scale(1.25);
z-index:10;
}

.cardOverlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,black,transparent);
opacity:0;
transition:.3s;
}

.card:hover .cardOverlay{opacity:1;}

.cardBtns{
display:flex;
gap:5px;
margin-top:5px;
}

.cardBtns button{
background:rgba(255,255,255,0.2);
border:none;
color:white;
cursor:pointer;
}

/* PROGRESS BAR */
.progress{
position:absolute;
bottom:0;
left:0;
height:4px;
background:red;
}

/* PLAYER */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#141414;
z-index:9999;
display:none;
flex-direction:column;
}

.videoBox{
width:100%;
padding-top:56.25%;
position:relative;
}

.videoBox iframe{
position:absolute;
top:0;
width:100%;
height:100%;
}

.fullBtn{
position:absolute;
top:10px;
right:10px;
z-index:10;
}

</style>
</head>

<body>

<header>
<h2>NZM FLIX</h2>
<input id="search" placeholder="Search...">
</header>

<div class="hero" id="hero"></div>

<div class="section"><h3>Trending</h3><div id="trending" class="row"></div></div>
<div class="section"><h3>My List</h3><div id="mylist" class="row"></div></div>
<div class="section"><h3>Recommended</h3><div id="recommended" class="row"></div></div>
<div class="section"><h3>Continue Watching</h3><div id="continue" class="row"></div></div>

<div class="player" id="player">
<div class="videoBox">
<button class="fullBtn" onclick="goFull()">⛶</button>
<iframe id="frame" allowfullscreen></iframe>
</div>
<div id="playerDetails"></div>
</div>

<script>
const API="2f7637ba9b3253a84483afa03480473a";
const IMG="https://image.tmdb.org/t/p/original";

async function get(u){return (await fetch(u)).json();}

/* HEADER SCROLL */
window.addEventListener("scroll",()=>{
document.querySelector("header").style.background =
window.scrollY>50 ? "#141414" : "linear-gradient(to bottom,rgba(0,0,0,.9),transparent)";
});

/* HERO WITH TRAILER */
async function setHero(i){
const vid=await get(`https://api.themoviedb.org/3/${i.media_type||"movie"}/${i.id}/videos?api_key=${API}`);

let trailer=vid.results.find(v=>v.type==="Trailer");

document.getElementById("hero").innerHTML=`
<video autoplay muted loop>
<source src="https://www.youtube.com/embed/${trailer?.key}?autoplay=1&mute=1">
</video>

<div class="heroContent">
<h1>${i.title||i.name}</h1>
<p>${i.overview||""}</p>

<div>
<button class="playBtn" onclick='playNow(${i.id},"movie")'>Play</button>
<button class="infoBtn" onclick='saveMyList(${JSON.stringify(i)})'>+ My List</button>
</div>
</div>
`;
}
 <script>

/* DISPLAY */
function display(list,id){
const row=document.getElementById(id);
row.innerHTML="";

list.forEach(i=>{
if(!i.poster_path) return;

const card=document.createElement("div");
card.className="card";

let progress=getProgress(i.id);

card.innerHTML=`
<img src="${IMG+i.poster_path}">
<div class="cardOverlay">
<b>${i.title||i.name}</b>
<div class="cardBtns">
<button onclick='playNow(${i.id},"movie")'>▶</button>
<button onclick='openPlayer(${JSON.stringify(i)})'>i</button>
</div>
</div>
${progress?`<div class="progress" style="width:${progress}%"></div>`:""}
`;

card.onmouseenter=()=>previewTrailer(card,i);

row.appendChild(card);
});
}

/* TRAILER PREVIEW */
async function previewTrailer(card,i){
const vid=await get(`https://api.themoviedb.org/3/movie/${i.id}/videos?api_key=${API}`);
let t=vid.results.find(v=>v.type==="Trailer");
if(!t) return;

card.innerHTML+=`
<iframe src="https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1"></iframe>
`;
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="flex";
playNow(i.id,"movie");
}

function playNow(id,type){
const frame=document.getElementById("frame");

frame.src=`https://vidsrc.xyz/embed/movie/${id}`;

frame.onload=()=>{
let saved=JSON.parse(localStorage.getItem("progress")||"{}");
if(saved[id]){
frame.contentWindow.postMessage({time:saved[id]},"*");
}
};

setInterval(()=>{
saveProgress(id,Math.random()*100); // simulate
},5000);
}

/* PROGRESS */
function saveProgress(id,time){
let data=JSON.parse(localStorage.getItem("progress")||"{}");
data[id]=time;
localStorage.setItem("progress",JSON.stringify(data));
}

function getProgress(id){
let data=JSON.parse(localStorage.getItem("progress")||"{}");
return data[id];
}

/* MY LIST */
function saveMyList(i){
let list=JSON.parse(localStorage.getItem("mylist")||"[]");
if(!list.find(x=>x.id===i.id)) list.push(i);
localStorage.setItem("mylist",JSON.stringify(list));
loadMyList();
}

function loadMyList(){
display(JSON.parse(localStorage.getItem("mylist")||[]),"mylist");
}

/* RECOMMENDATION */
async function loadRecommended(){
let history=JSON.parse(localStorage.getItem("continue")||"[]");
if(!history.length) return;

let res=await get(`https://api.themoviedb.org/3/movie/${history[0].id}/recommendations?api_key=${API}`);
display(res.results,"recommended");
}

/* HOME */
async function loadHome(){
let t=await get(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API}`);
display(t.results,"trending");
setHero(t.results[0]);
loadMyList();
loadRecommended();
}

loadHome();

</script>

</body>
</html>
