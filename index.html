<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeminiFlix</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#141414;
color:white;
font-family:Arial,Helvetica,sans-serif;
}

.row{
margin-left:20px;
}

.row-posters{
display:flex;
overflow-x:auto;
padding:20px;
}

.row-posters img{
max-height:180px;
margin-right:10px;
cursor:pointer;
transition:transform .2s;
}

.row-posters img:hover{
transform:scale(1.08);
}

#playerModal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:black;
z-index:999;
display:none;
}

#playerFrame{
width:100%;
height:100%;
border:none;
}

.closeBtn{
position:absolute;
top:15px;
right:15px;
background:red;
padding:8px 14px;
cursor:pointer;
z-index:1000;
}

header{
height:60vh;
background-size:cover;
background-position:center;
padding:40px;
}

.banner-title{
font-size:40px;
font-weight:bold;
}

.banner-desc{
width:45%;
}
</style>
</head>

<body>

<header id="banner">
<h1 id="banner-title" class="banner-title"></h1>
<p id="banner-desc" class="banner-desc"></p>
</header>

<div id="rows"></div>

<!-- PLAYER -->
<div id="playerModal">
<div class="closeBtn" onclick="closePlayer()">CLOSE</div>
<iframe id="playerFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
</div>

<script>

const API_KEY = "2f7637ba9b3253a84483afa03480473a";
const BASE = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/original";

const requests = {
trending:`/trending/movie/week?api_key=${API_KEY}`,
top:`/movie/top_rated?api_key=${API_KEY}`,
action:`/discover/movie?api_key=${API_KEY}&with_genres=28`,
comedy:`/discover/movie?api_key=${API_KEY}&with_genres=35`,
horror:`/discover/movie?api_key=${API_KEY}&with_genres=27`
};

async function fetchMovies(url){
const res = await fetch(BASE + url);
const data = await res.json();
return data.results;
}

function createRow(title,movies){

const row = document.createElement("div");
row.className="row";

const h2 = document.createElement("h2");
h2.textContent = title;

const posters = document.createElement("div");
posters.className="row-posters";

movies.forEach(movie=>{

if(!movie.poster_path) return;

const img = document.createElement("img");
img.src = IMG + movie.poster_path;

img.onclick = ()=> playMovie(movie);

posters.appendChild(img);

});

row.appendChild(h2);
row.appendChild(posters);

document.getElementById("rows").appendChild(row);
}

function playMovie(movie){

const id = movie.id;

const servers = [

`https://vidsrc.su/embed/movie/${id}`,
`https://vidsrc.me/embed/movie/${id}`,
`https://2embed.cc/embed/${id}`,
`https://multiembed.mov/?video_id=${id}&tmdb=1`

];

let i=0;

const player=document.getElementById("playerFrame");

player.src = servers[i];

player.onload=()=>{
setTimeout(()=>{
if(i<servers.length-1){
i++;
player.src=servers[i];
}
},3000);
};

document.getElementById("playerModal").style.display="block";
}

function closePlayer(){
document.getElementById("playerModal").style.display="none";
document.getElementById("playerFrame").src="";
}

(async()=>{

const trending = await fetchMovies(requests.trending);
const top = await fetchMovies(requests.top);
const action = await fetchMovies(requests.action);
const comedy = await fetchMovies(requests.comedy);
const horror = await fetchMovies(requests.horror);

createRow("Trending",trending);
createRow("Top Rated",top);
createRow("Action",action);
createRow("Comedy",comedy);
createRow("Horror",horror);

const banner = trending[Math.floor(Math.random()*trending.length)];

document.getElementById("banner").style.backgroundImage =
`url(${IMG}${banner.backdrop_path})`;

document.getElementById("banner-title").textContent =
banner.title;

document.getElementById("banner-desc").textContent =
banner.overview;

})();

</script>

</body>
</html>
