<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Premium</title>

    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
            --card-width: 200px;
            --card-height: 112px;
            --transition: all 0.4s cubic-bezier(0.33, 1, 0.68, 1);
        }

        body {
            margin: 0; background: var(--netflix-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white; overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 4%; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.4s;
        }
        header.scrolled { background: #000; padding: 10px 4%; }
        header h2 { color: var(--netflix-red); margin: 0; font-size: 24px; font-weight: 900; }

        .search-box {
            background: rgba(0,0,0,0.6); border: 1px solid #555;
            padding: 5px 10px; border-radius: 4px; display: flex; align-items: center;
        }
        #search { background: transparent; border: none; color: white; outline: none; width: 120px; transition: 0.3s; }

        /* --- HERO --- */
        .hero {
            height: 75vh; display: flex; align-items: center; padding: 0 4%;
            background-size: cover; background-position: center; position: relative;
        }
        .hero::after {
            content: ""; position: absolute; bottom: 0; left: 0; right: 0;
            height: 50%; background: linear-gradient(to top, var(--netflix-black), transparent);
        }
        .heroContent { position: relative; z-index: 2; max-width: 550px; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; text-shadow: 2px 2px 4px #000; }
        
        .play-btn { background: white; color: black; padding: 10px 25px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; font-size: 1rem; }

        /* --- ROWS --- */
        .section { padding: 20px 0 10px 4%; }
        .row { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }

        .card {
            min-width: var(--card-width); height: var(--card-height);
            background: #222; border-radius: 4px; overflow: hidden;
            transition: var(--transition); cursor: pointer; position: relative;
        }
        .card:hover { transform: scale(1.1); z-index: 10; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-name {
            position: absolute; bottom: 0; width: 100%; padding: 5px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 11px; font-weight: bold; text-align: center;
        }

        /* --- PLAYER OVERLAY --- */
        .player {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; overflow-y: auto;
        }
        
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .video-box iframe { width: 100%; height: 100%; border: none; }

        /* LANDSCAPE TRIGGER */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            .video-box.active-landscape {
                position: fixed; top: 50%; left: 50%;
                width: 100vh; height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
                z-index: 3000;
            }
        }

        .details { padding: 20px 5%; }
        
        /* Season Selector Styling */
        #seasonSelect {
            background: #333; color: white; border: 1px solid #555;
            padding: 8px 12px; border-radius: 4px; font-size: 1rem;
            margin-bottom: 20px; width: 100%; max-width: 200px;
        }

        /* Episode List with Small Description */
        .ep-item {
            display: flex; gap: 15px; padding: 12px 0;
            border-bottom: 1px solid #333; cursor: pointer;
        }
        .ep-item:hover { background: #1a1a1a; }
        .ep-img { width: 130px; height: 74px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .ep-info { display: flex; flex-direction: column; justify-content: center; }
        .ep-title { font-weight: bold; margin-bottom: 4px; font-size: 0.95rem; }
        .ep-desc { font-size: 0.75rem; color: #999; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .close-player {
            position: fixed; top: 15px; right: 15px; z-index: 4000;
            background: rgba(0,0,0,0.6); color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%; font-size: 18px; cursor: pointer;
        }

        #searchOverlay {
            position: fixed; top: 60px; left: 0; width: 100%; height: 100%;
            background: rgba(20,20,20,0.98); z-index: 1500; display: none; padding: 40px 4%;
        }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    </style>
</head>
<body>

<header id="nav">
    <h2 onclick="location.reload()" style="cursor:pointer">NZM FLIX</h2>
    <div class="search-box">
        <input id="search" placeholder="Search..." autocomplete="off">
    </div>
</header>

<div id="hero" class="hero"></div>

<div class="section"><h3>Trending Now</h3><div class="row" id="trending"></div></div>
<div class="section"><h3>Anime Classics</h3><div class="row" id="anime"></div></div>
<div class="section"><h3>K-Drama</h3><div class="row" id="kdrama"></div></div>

<div id="searchOverlay"><div class="search-grid" id="searchGrid"></div></div>

<div class="player" id="player">
    <button class="close-player" onclick="closePlayer()">✕</button>
    <div class="video-box" id="vBox">
        <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="details" id="pDetails"></div>
    <div style="padding: 0 5%;">
        <select id="seasonSelect" onchange="changeSeason()"></select>
        <div id="epList"></div>
    </div>
</div>

<script>
const API = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const THUMB = "https://image.tmdb.org/t/p/w500";

let currentTVId = null;

async function get(path) {
    const res = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${API}`);
    return res.json();
}

async function init() {
    const trend = await get('/trending/all/day');
    setHero(trend.results[0]);
    renderRow(trend.results, 'trending');
    
    const anime = await get('/discover/tv?with_genres=16&with_original_language=ja');
    renderRow(anime.results, 'anime');

    const kdrama = await get('/discover/tv?with_genres=18&with_original_language=ko');
    renderRow(kdrama.results, 'kdrama');
}

function renderRow(list, id) {
    const container = document.getElementById(id);
    list.forEach(i => {
        if(!i.backdrop_path) return;
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `<img src="${THUMB + i.backdrop_path}"><div class="card-name">${i.title || i.name}</div>`;
        c.onclick = () => openPlayer(i);
        container.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById("hero");
    h.style.backgroundImage = `linear-gradient(to right, #141414, transparent), url(${IMG+i.backdrop_path})`;
    h.innerHTML = `<div class="heroContent"><h1>${i.title || i.name}</h1>
        <button class="play-btn" onclick='openPlayer(${JSON.stringify(i).replace(/'/g,"")})'>▶ Play Now</button></div>`;
}

async function openPlayer(i) {
    const p = document.getElementById('player');
    const frame = document.getElementById('mainFrame');
    p.style.display = "block";
    document.getElementById('vBox').classList.remove('active-landscape'); 
    
    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await get(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === "Trailer") || v.results[0];
    
    if(trailer) frame.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0`;

    document.getElementById('pDetails').innerHTML = `
        <h2 style="margin:0">${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:14px; margin-bottom: 20px;">${i.overview}</p>
        <button onclick="startStream(${i.id}, '${type}')" style="background:white; color:black; border:none; padding:15px; width:100%; font-weight:bold; border-radius:4px;">▶ START WATCHING</button>
    `;

    if(type === 'tv') {
        currentTVId = i.id;
        loadSeasonList(i.id);
    } else {
        document.getElementById('seasonSelect').style.display = 'none';
        document.getElementById('epList').innerHTML = "";
    }
}

async function loadSeasonList(id) {
    const data = await get(`/tv/${id}`);
    const sel = document.getElementById('seasonSelect');
    sel.style.display = 'block';
    sel.innerHTML = "";
    data.seasons.forEach(s => {
        if(s.season_number === 0) return;
        const opt = document.createElement('option');
        opt.value = s.season_number;
        opt.text = `Season ${s.season_number}`;
        sel.appendChild(opt);
    });
    loadEpisodes(id, 1);
}

function changeSeason() {
    const sNum = document.getElementById('seasonSelect').value;
    loadEpisodes(currentTVId, sNum);
}

async function loadEpisodes(id, sNum) {
    const data = await get(`/tv/${id}/season/${sNum}`);
    const list = document.getElementById('epList');
    list.innerHTML = "";
    data.episodes.forEach(e => {
        const d = document.createElement('div'); d.className = 'ep-item';
        d.onclick = () => startStream(id, 'tv', sNum, e.episode_number);
        d.innerHTML = `
            <img class="ep-img" src="${THUMB + e.still_path}">
            <div class="ep-info">
                <div class="ep-title">${e.episode_number}. ${e.name}</div>
                <div class="ep-desc">${e.overview || "No description available."}</div>
            </div>`;
        list.appendChild(d);
    });
}

function startStream(id, type, s=1, e=1) {
    const frame = document.getElementById('mainFrame');
    document.getElementById('vBox').classList.add('active-landscape');
    frame.src = type === 'tv' 
        ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` 
        : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
}

function closePlayer() {
    document.getElementById('player').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.getElementById('vBox').classList.remove('active-landscape');
    document.body.style.overflow = "auto";
}

init();
</script>
</body>
</html>
