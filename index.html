<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Master Edition 2026</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000; 
            --card-w: clamp(140px, 15vw, 190px); 
            --card-h: calc(var(--card-w) * 1.5);
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* NAVIGATION */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: 0.3s; }
        header.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: clamp(22px, 4vw, 28px); font-weight: 900; letter-spacing: -1.5px; cursor: pointer; }
        .search-icon { font-size: 24px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .search-icon:hover { transform: scale(1.2); }

        /* HERO SECTION */
        .hero { height: 75vh; background: center/cover no-repeat; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%), linear-gradient(to right, rgba(0,0,0,0.7), transparent); }
        .hero-body { position: relative; z-index: 10; max-width: 800px; }
        .hero-body h1 { font-size: clamp(2rem, 6vw, 4rem); margin: 0; font-weight: 900; }

        /* ROWS & CATEGORIES */
        .section { padding: 30px 0 0 5%; }
        .section h3 { font-size: 1.2rem; color: #e5e5e5; margin-bottom: 10px; }
        .row { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0 30px; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }

        .card { min-width: var(--card-w); width: var(--card-w); cursor: pointer; border-radius: 6px; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); position: relative; outline: none; }
        .card:hover, .card:focus { transform: scale(1.1); z-index: 20; box-shadow: 0 0 20px var(--red); }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 6px; background: #111; }
        .card-name { font-size: 12px; font-weight: 600; margin-top: 8px; text-align: center; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER MODAL */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2500; display: none; overflow-y: auto; }
        .modal-content { display: flex; flex-direction: column; width: 100%; }
        @media (min-width: 1024px) {
            .modal-content { flex-direction: row-reverse; padding: 80px 5%; gap: 40px; }
            .video-wrap { width: 60%; position: sticky; top: 100px; border-radius: 12px; overflow: hidden; }
            .info-wrap { flex: 1; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #111; position: sticky; top: 0; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }

        /* BUTTONS & UI */
        .btn { padding: 14px 24px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; font-size: 15px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-red { background: var(--red); color: white; width: 100%; justify-content: center; margin-top: 15px; }
        .btn-white { background: white; color: black; }

        .srv-bar { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; }
        .srv-btn { background: #222; color: #888; padding: 8px 15px; border-radius: 4px; font-size: 12px; border: 1px solid #333; cursor: pointer; white-space: nowrap; }
        .srv-btn.active { background: var(--red); color: white; border-color: var(--red); }

        .ep-card { display: flex; gap: 15px; padding: 12px; background: #111; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .ep-thumb { width: 120px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }

        .close-btn { position: fixed; top: 20px; right: 20px; z-index: 3000; background: rgba(0,0,0,0.7); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        /* SEARCH VIEW */
        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; padding: 100px 5% 50px; overflow-y: auto; }
        .search-bar { width: 100%; max-width: 600px; display: block; margin: 0 auto 40px; padding: 15px 25px; background: #111; border: 2px solid #333; color: white; border-radius: 50px; font-size: 18px; outline: none; }
    </style>
</head>
<body>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div class="search-icon" onclick="openSearch()">🔍</div>
</header>

<main id="mainUI">
    <div id="hero" class="hero"></div>
    <div class="section"><h3>🏆 Top Philippines</h3><div class="row" id="ph-row"></div></div>
    <div class="section"><h3>🔥 Trending Now</h3><div class="row" id="trend-row"></div></div>
    <div class="section"><h3>🎎 K-Drama</h3><div class="row" id="kdrama-row"></div></div>
    <div class="section"><h3>🏮 Asian Hits</h3><div class="row" id="asian-row"></div></div>
    <div class="section"><h3>😂 Comedy</h3><div class="row" id="comedy-row"></div></div>
    <div class="section"><h3>💥 Action</h3><div class="row" id="action-row"></div></div>
    <div class="section"><h3>🎌 Anime</h3><div class="row" id="anime-row"></div></div>
    <div class="section"><h3>🎈 Kids</h3><div class="row" id="kids-row"></div></div>
    <div class="section"><h3>👨‍👩‍👧 Family</h3><div class="row" id="family-row"></div></div>
</main>

<div id="searchView">
    <button class="close-btn" onclick="closeSearch()">✕</button>
    <input type="text" id="searchInput" class="search-bar" placeholder="Search for movies, series, anime...">
    <div class="row" style="flex-wrap: wrap; justify-content: center; gap: 20px;" id="searchRes"></div>
</div>

<div class="modal" id="pModal">
    <button class="close-btn" onclick="closeM()">✕</button>
    <div class="modal-content">
        <div class="video-wrap" id="vidArea"><iframe id="frame" allowfullscreen allow="autoplay"></iframe></div>
        <div class="info-wrap" style="padding: 20px;">
            <div id="meta"></div>
            <div class="srv-bar">
                <button class="srv-btn active" onclick="setSrv(1, this)">Server 1</button>
                <button class="srv-btn" onclick="setSrv(2, this)">Server 2 (VIP)</button>
                <button class="srv-btn" onclick="setSrv(3, this)">Server 3</button>
                <button class="srv-btn" onclick="setSrv(4, this)">Server 4</button>
            </div>
            <div id="tvUI" style="display:none; margin-top: 20px;">
                <select id="seasonSelect" onchange="loadEps()" style="width:100%; padding:12px; background:#222; color:white; border:1px solid #444; border-radius:5px;"></select>
                <div id="epList" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let activeItem = null, curSrv = 1, curEp = { s: 1, e: 1 };

async function api(path) { return (await fetch(`https://api.themoviedb.org/3${path}${path.includes('?')?'&':'?'}api_key=${KEY}`)).json(); }

async function init() {
    const ph = await api('/trending/all/day?region=PH');
    setHero(ph.results[0]);
    fill('ph-row', ph.results);
    fill('trend-row', (await api('/trending/all/week')).results);
    fill('kdrama-row', (await api('/discover/tv?with_original_language=ko')).results);
    fill('asian-row', (await api('/discover/tv?with_original_language=zh|th')).results);
    fill('comedy-row', (await api('/discover/movie?with_genres=35')).results);
    fill('action-row', (await api('/discover/movie?with_genres=28')).results);
    fill('anime-row', (await api('/discover/tv?with_genres=16')).results);
    fill('kids-row', (await api('/discover/movie?with_genres=16&without_genres=10751')).results);
    fill('family-row', (await api('/discover/movie?with_genres=10751')).results);
}

function fill(id, data) {
    const r = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const c = document.createElement('div'); c.className = 'card'; c.tabIndex = 0;
        c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
        c.onclick = () => openM(i);
        r.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + i.backdrop_path})`;
    h.innerHTML = `<div class="hero-overlay"></div><div class="hero-body"><h1>${i.title||i.name}</h1><p style="color:#ccc; margin:20px 0;">${i.overview.slice(0,140)}...</p><button class="btn btn-white" onclick='openM(${JSON.stringify(i).replace(/'/g,"")})'>▶ Details</button></div>`;
}

// SEARCH LOGIC
function openSearch() { document.getElementById('searchView').style.display='block'; document.getElementById('searchInput').focus(); }
function closeSearch() { document.getElementById('searchView').style.display='none'; }

document.getElementById('searchInput').oninput = async (e) => {
    const q = e.target.value;
    if(q.length > 2) {
        const d = await api(`/search/multi?query=${q}`);
        const res = document.getElementById('searchRes');
        res.innerHTML = "";
        d.results.forEach(i => {
            if(!i.poster_path) return;
            const c = document.createElement('div'); c.className = 'card';
            c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
            c.onclick = () => { closeSearch(); openM(i); };
            res.appendChild(c);
        });
    }
};

// MODAL & SERVER LOGIC
async function openM(i) {
    activeItem = i; curEp = { s: 1, e: 1 };
    document.getElementById('pModal').style.display = "block";
    document.body.style.overflow = "hidden";
    
    // BYPASS YOUTUBE BUG: Use KinoCheck Engine for Trailers
    document.getElementById('frame').src = `https://kinocheck.com/embed/${i.id}`;

    document.getElementById('meta').innerHTML = `
        <h2 style="margin:0;">${i.title || i.name}</h2>
        <p style="color:#777; font-size:14px; margin:10px 0;">${i.overview}</p>
        <button class="btn btn-red" onclick="watch(true)">🚀 PLAY FULL CONTENT</button>
    `;

    if(i.first_air_date) {
        document.getElementById('tvUI').style.display = 'block';
        const d = await api(`/tv/${i.id}`);
        const sel = document.getElementById('seasonSelect');
        sel.innerHTML = d.seasons.filter(s=>s.season_number>0).map(s=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
        loadEps();
    } else document.getElementById('tvUI').style.display = 'none';
}

async function loadEps() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await api(`/tv/${activeItem.id}/season/${s}`);
    const list = document.getElementById('epList');
    list.innerHTML = d.episodes.map(e => `
        <div class="ep-card" onclick="playEp(${s},${e.episode_number})">
            <img class="ep-thumb" src="${e.still_path ? POSTER+e.still_path : ''}">
            <div style="flex:1"><b>${e.episode_number}. ${e.name}</b><p style="font-size:11px; color:#555;">${e.overview || 'No info.'}</p></div>
        </div>
    `).join('');
}

function playEp(s, e) { curEp = { s, e }; watch(true); }

function setSrv(n, btn) {
    curSrv = n;
    document.querySelectorAll('.srv-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(!document.getElementById('frame').src.includes('kinocheck')) watch(true);
}

async function watch(full = false) {
    const f = document.getElementById('frame');
    const type = activeItem.first_air_date ? 'tv' : 'movie';
    if(full) {
        const area = document.getElementById('vidArea');
        if (area.requestFullscreen) await area.requestFullscreen();
    }
    
    const id = activeItem.id;
    const { s, e } = curEp;
    let url = "";
    if(curSrv === 1) url = `https://vidsync.xyz/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
    else if(curSrv === 2) url = `https://vidsrc.cc/v2/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
    else if(curSrv === 3) url = `https://multiembed.mov/?video_id=${id}&tmdb=1${type==='tv'?`&s=${s}&e=${e}`:''}`;
    else url = `https://vidsrc.pro/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;

    f.src = url;
}

function closeM() { document.getElementById('pModal').style.display='none'; document.getElementById('frame').src=''; document.body.style.overflow='auto'; }

window.onscroll = () => { document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50); };
init();
</script>
</body>
</html>
