<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZM FLIX</title>

<style>
body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);
}

#search{
background:rgba(255,255,255,.15);
border:none;
padding:8px 12px;
border-radius:4px;
color:white;
outline:none;
}

/* HERO */
.hero{
height:85vh;
display:flex;
align-items:flex-end;
padding:60px 30px;
background-size:cover;
background-position:center;
position:relative;
}

.hero:after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,#141414,transparent);
}

.heroContent{
position:relative;
z-index:2;
max-width:500px;
}

/* BUTTONS */
.btn{
padding:10px 20px;
border-radius:4px;
cursor:pointer;
}
.play{background:white;color:black}
.info{background:rgba(255,255,255,.2)}
.add{background:rgba(0,255,0,.2)}

/* ROW */
.section{padding:20px}
.row{
display:flex;
gap:10px;
overflow-x:auto;
}
.row::-webkit-scrollbar{display:none}

/* CARD */
.card{
min-width:150px;
height:220px;
border-radius:6px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:.3s;
}
.card img{
width:100%;
height:100%;
object-fit:cover;
}
.card:hover{
transform:scale(1.15);
z-index:5;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,black,transparent);
opacity:0;
}
.card:hover .overlay{opacity:1}

/* HOVER TRAILER */
.preview{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}
.card:hover .preview{
display:block;
}

/* PLAYER */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#141414;
z-index:999;
display:none;
flex-direction:column;
overflow-y:auto;
}

.videoBox{
position:relative;
width:100%;
padding-top:56.25%;
background:black;
}
.videoBox iframe{
position:absolute;
top:0;
width:100%;
height:100%;
}

.controls{
position:absolute;
top:10px;
left:10px;
z-index:5;
display:flex;
gap:5px;
}

.ctrlBtn{
background:rgba(0,0,0,.6);
border:none;
color:white;
padding:8px;
cursor:pointer;
}

/* AUTOPLAY NEXT */
.nextBox{
position:absolute;
bottom:20px;
right:20px;
background:black;
padding:15px;
display:none;
}

/* MOBILE */
@media(max-width:600px){
.card{min-width:110px;height:160px}
.hero{height:70vh}
header h2{font-size:16px}
}
</style>
</head>

<body>

<header>
<h2>NZM FLIX</h2>
<input id="search" placeholder="Search">
</header>

<div class="hero" id="hero"></div>

<div class="section">
<h3>Trending</h3>
<div class="row" id="trending"></div>
</div>

<div class="section">
<h3>My List ⭐</h3>
<div class="row" id="mylist"></div>
</div>

<div class="section">
<h3>Top Rated</h3>
<div class="row" id="top"></div>
</div>

<div class="section">
<h3>TV Shows</h3>
<div class="row" id="tv"></div>
</div>

<div class="player" id="player">

<div class="videoBox">

<div class="controls">
<button class="ctrlBtn" onclick="closePlayer()">←</button>
<button class="ctrlBtn" onclick="nextEpisode()">Next</button>
</div>

<div class="nextBox" id="nextBox">
Next episode in <span id="count">5</span>s
</div>

<iframe id="frame" allowfullscreen></iframe>

</div>

<div id="episodes"></div>

</div>

<script>
const API="2f7637ba9b3253a84483afa03480473a";
const IMG="https://image.tmdb.org/t/p/original";

async function get(u){
return (await fetch(u)).json();
}

/* DISPLAY */
function display(list,id){

const row=document.getElementById(id);
row.innerHTML="";

list.forEach(i=>{

if(!i.poster_path) return;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${IMG+i.poster_path}">
<div class="overlay">${i.title||i.name}</div>
<div class="preview" id="p${i.id}"></div>
`;

card.onclick=()=>openPlayer(i);

/* HOVER TRAILER */
card.onmouseenter=()=>loadPreview(i);
card.onmouseleave=()=>stopPreview(i);

row.appendChild(card);

});
}

 <script>

/* HERO */
function setHero(i){
const hero=document.getElementById("hero");
hero.style.backgroundImage=`url(${IMG+i.backdrop_path})`;

hero.innerHTML=`
<div class="heroContent">
<h1>${i.title||i.name}</h1>
<p>${i.overview||""}</p>
<div class="btn play" onclick="playNow(${i.id},'movie')">▶ Play</div>
<div class="btn add" onclick='addList(${JSON.stringify(i)})'>+ My List</div>
</div>
`;
}

/* HOME */
async function loadHome(){
const t=await get(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}`);
display(t.results,"trending");
setHero(t.results[0]);

const top=await get(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API}`);
display(top.results,"top");

const tv=await get(`https://api.themoviedb.org/3/trending/tv/day?api_key=${API}`);
display(tv.results,"tv");

loadList();
}

/* PREVIEW */
async function loadPreview(i){
const res=await get(`https://api.themoviedb.org/3/${i.first_air_date?"tv":"movie"}/${i.id}/videos?api_key=${API}`);
const trailer=res.results.find(v=>v.type==="Trailer");
if(!trailer) return;

document.getElementById("p"+i.id).innerHTML=
`<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1"></iframe>`;
}

function stopPreview(i){
document.getElementById("p"+i.id).innerHTML="";
}

/* PLAYER */
let currentEpisode=1;
let timer;

function openPlayer(i){
document.getElementById("player").style.display="flex";
playNow(i.id,i.first_air_date?"tv":"movie");
}

/* PLAY */
function playNow(id,type){
document.getElementById("frame").src=
type==="tv"
?`https://vidsrc.xyz/embed/tv?tmdb=${id}&season=1&episode=${currentEpisode}`
:`https://vidsrc.xyz/embed/movie?tmdb=${id}`;

startNextTimer();
}

/* AUTO NEXT */
function startNextTimer(){
let c=5;
const box=document.getElementById("nextBox");
box.style.display="block";

timer=setInterval(()=>{
c--;
document.getElementById("count").innerText=c;
if(c<=0){
clearInterval(timer);
nextEpisode();
}
},1000);
}

function nextEpisode(){
currentEpisode++;
playNow(currentEpisode,"tv");
}

/* CLOSE */
function closePlayer(){
clearInterval(timer);
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

/* MY LIST */
function addList(i){
let list=JSON.parse(localStorage.getItem("mylist")||"[]");
list.unshift(i);
localStorage.setItem("mylist",JSON.stringify(list));
loadList();
}

function loadList(){
const list=JSON.parse(localStorage.getItem("mylist")||"[]");
display(list,"mylist");
}

/* SEARCH */
document.getElementById("search").addEventListener("input",async e=>{
const q=e.target.value;
if(q.length<2) return;

const data=await get(`https://api.themoviedb.org/3/search/multi?api_key=${API}&query=${q}`);
display(data.results,"trending");
});

/* INIT */
loadHome();

</script>

</body>
</html>
