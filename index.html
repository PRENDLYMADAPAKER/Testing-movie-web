<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Premium Hybrid</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000000; --card-w: 165px; --card-h: 245px;
            --transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @media (min-width: 1024px) {
            :root { --card-w: 200px; --card-h: 290px; }
        }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- LOADING SPINNER --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center; transition: 0.6s;
        }
        .spinner {
            width: 60px; height: 60px; border: 4px solid rgba(229, 9, 20, 0.1);
            border-top: 4px solid var(--red); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- HEADER --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; 
            justify-content: space-between; align-items: center; padding: 20px 5%; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); transition: 0.3s;
        }
        header.scrolled { background: var(--bg); padding: 12px 5%; border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: 28px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; }

        /* --- HERO --- */
        .hero { height: 80vh; background-size: cover; background-position: center top; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 70%); }
        .hero-body { position: relative; z-index: 10; max-width: 700px; }
        .hero-body h1 { font-size: clamp(2rem, 5vw, 4rem); margin: 0; font-weight: 800; }
        
        .btn { padding: 12px 25px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-white { background: white; color: black; }
        .btn-red { background: var(--red); color: white; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* --- ROWS --- */
        .section { padding: 30px 0 0 5%; }
        .row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 25px; scroll-snap-type: x mandatory; }
        .row::-webkit-scrollbar { display: none; }
        
        .card { 
            min-width: var(--card-w); height: var(--card-h); border-radius: 6px; 
            background: #111; position: relative; cursor: pointer; transition: var(--transition);
            scroll-snap-align: start; outline: none; border: 2px solid transparent;
        }
        .card:hover, .card:focus { transform: scale(1.08); z-index: 10; border-color: white; }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

        /* --- HYBRID PLAYER MODAL (TV/PC OPTIMIZED) --- */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        
        .modal-container { 
            display: flex; flex-direction: column; width: 100%; min-height: 100vh;
        }

        /* PC/TV Layout: Video is a side-player, Content is on the left */
        @media (min-width: 1024px) {
            .modal-container { 
                flex-direction: row-reverse; padding: 80px 5% 50px; gap: 50px; 
                max-width: 1400px; margin: 0 auto; align-items: flex-start;
            }
            .video-side { 
                width: 500px; flex-shrink: 0; position: sticky; top: 100px; 
                box-shadow: 0 20px 50px rgba(0,0,0,0.8); border-radius: 12px; overflow: hidden;
            }
            .info-side { flex-grow: 1; }
        }

        .video-side { width: 100%; aspect-ratio: 16/9; background: #111; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .info-side { padding: 30px 5%; }
        .close-btn { position: fixed; top: 25px; right: 25px; z-index: 3000; background: rgba(0,0,0,0.6); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .close-btn:hover { background: var(--red); }

        .season-selector { 
            background: #222; color: white; border: 1px solid #444; padding: 12px 20px; 
            border-radius: 4px; font-size: 16px; margin: 25px 0; width: 100%; max-width: 250px;
            cursor: pointer; outline: none;
        }

        .ep-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .ep-card { 
            display: flex; gap: 20px; padding: 15px; border-radius: 8px; background: rgba(255,255,255,0.03);
            transition: 0.3s; cursor: pointer; align-items: center; border: 1px solid transparent;
        }
        .ep-card:hover { background: rgba(255,255,255,0.1); border-color: #444; }
        .ep-thumb { width: 150px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .ep-info b { font-size: 17px; color: #fff; display: block; margin-bottom: 5px; }
        .ep-info p { font-size: 14px; color: #999; line-height: 1.4; margin: 0; }

        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; padding: 110px 5% 50px; overflow-y: auto; }
        .search-bar { width: 100%; max-width: 600px; padding: 18px 25px; background: #181818; border: 1px solid #333; color: white; border-radius: 50px; font-size: 18px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--red); background: #222; }

    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div style="display:flex; gap: 25px; align-items:center;">
        <span onclick="toggleSearch()" style="font-size: 24px; cursor:pointer; opacity: 0.8;">🔍</span>
        <div style="width: 34px; height: 34px; background: #2b93d1; border-radius: 4px;"></div>
    </div>
</header>

<main id="home">
    <div id="hero" class="hero"></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="top-ph"></div></div>
    <div class="section"><h3>New Releases</h3><div class="row" id="kdrama"></div></div>
    <div class="section"><h3>Action Thrillers</h3><div class="row" id="asian"></div></div>
</main>

<div class="modal" id="playerModal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-container">
        <div class="video-side" id="vContainer">
            <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
        
        <div class="info-side">
            <div id="meta-content"></div>
            
            <div id="tv-controls" style="display:none;">
                <select id="seasonSelect" class="season-selector" onchange="loadEpisodes()"></select>
                <div id="episodeList" class="ep-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="searchView">
    <div style="text-align:center; margin-bottom:50px;">
        <input type="text" id="searchField" class="search-bar" placeholder="Search movies, TV shows...">
    </div>
    <div class="row" style="flex-wrap: wrap; justify-content: center; gap: 20px;" id="searchResults"></div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let activeItem = null;

async function api(path) {
    const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}`);
    return r.json();
}

async function init() {
    try {
        const ph = await api('/trending/all/day?region=PH');
        setHero(ph.results[0]);
        renderRow('top-ph', ph.results);

        const kd = await api('/discover/tv?with_original_language=ko&sort_by=popularity.desc');
        renderRow('kdrama', kd.results);

        const as = await api('/discover/movie?with_genres=28&sort_by=vote_count.desc');
        renderRow('asian', as.results);
        
        // Remove Loader
        setTimeout(() => {
            document.getElementById('loader').style.opacity = "0";
            setTimeout(() => document.getElementById('loader').style.display = "none", 600);
        }, 800);
    } catch(e) { console.error("Initialization Failed", e); }
}

function renderRow(id, data) {
    const container = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.tabIndex = "0";
        card.innerHTML = `<img src="${POSTER + i.poster_path}">`;
        card.onclick = () => openItem(i);
        card.onkeydown = (e) => { if(e.key === "Enter") openItem(i); };
        container.appendChild(card);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + (i.backdrop_path || i.poster_path)})`;
    h.innerHTML = `<div class="hero-overlay"></div>
    <div class="hero-body">
        <h1>${i.title || i.name}</h1>
        <p style="color:#ddd; margin: 15px 0; font-size:17px; max-width:550px; line-height:1.5;">${i.overview.slice(0, 160)}...</p>
        <button class="btn btn-white" onclick='openItem(${JSON.stringify(i).replace(/'/g,"")})'><span>▶</span> Play</button>
    </div>`;
}

async function openItem(i) {
    activeItem = i;
    const m = document.getElementById('playerModal');
    const f = document.getElementById('mainFrame');
    m.style.display = "block";
    document.body.style.overflow = "hidden";

    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await api(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === "Trailer") || v.results[0];
    if(trailer) f.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&modestbranding=1`;

    document.getElementById('meta-content').innerHTML = `
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
            <span style="color:#46d369; font-weight:bold;">98% Match</span>
            <span style="border:1px solid #777; padding:2px 6px; font-size:12px; border-radius:3px;">HD</span>
            <span style="color:#aaa;">${(i.release_date || i.first_air_date || '').split('-')[0]}</span>
        </div>
        <h2 style="font-size: clamp(1.8rem, 4vw, 3rem); margin: 0 0 15px;">${i.title || i.name}</h2>
        <p style="font-size:16px; line-height:1.6; color:#ccc; max-width:700px;">${i.overview}</p>
        <button class="btn btn-red" onclick="watchNow(${i.id}, '${type}')" style="width:100%; max-width:320px; padding:18px; margin-top:25px; font-size:18px;">▶ WATCH NOW FULL CONTENT</button>
    `;

    if(type === 'tv') {
        document.getElementById('tv-controls').style.display = 'block';
        loadTVDetails(i.id);
    } else {
        document.getElementById('tv-controls').style.display = 'none';
    }
}

async function loadTVDetails(id) {
    const d = await api(`/tv/${id}`);
    const sel = document.getElementById('seasonSelect');
    sel.innerHTML = "";
    d.seasons.forEach(s => { 
        if(s.season_number > 0) sel.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`; 
    });
    loadEpisodes();
}

async function loadEpisodes() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await api(`/tv/${activeItem.id}/season/${s}`);
    const list = document.getElementById('episodeList');
    list.innerHTML = "";
    d.episodes.forEach(e => {
        const div = document.createElement('div');
        div.className = 'ep-card';
        div.onclick = () => watchNow(activeItem.id, 'tv', s, e.episode_number);
        div.innerHTML = `
            <img class="ep-thumb" src="${e.still_path ? POSTER + e.still_path : 'https://via.placeholder.com/150x84?text=No+Image'}">
            <div class="ep-info"><b>${e.episode_number}. ${e.name}</b><p>${e.overview ? e.overview.slice(0, 90) + '...' : 'No description.'}</p></div>
        `;
        list.appendChild(div);
    });
}

async function watchNow(id, type, s=1, e=1) {
    const f = document.getElementById('mainFrame');
    const container = document.getElementById('vContainer');
    
    // Switch source to full player
    f.src = type === 'tv' ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
    
    // Request Fullscreen
    if (container.requestFullscreen) container.requestFullscreen();
    else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
}

function closeModal() {
    const m = document.getElementById('playerModal');
    document.getElementById('mainFrame').src = "";
    m.style.display = "none";
    document.body.style.overflow = "auto";
}

function toggleSearch() {
    const s = document.getElementById('searchView');
    const active = s.style.display === 'block';
    s.style.display = active ? 'none' : 'block';
    if(!active) document.getElementById('searchField').focus();
}

document.getElementById('searchField').oninput = async (e) => {
    const q = e.target.value;
    const res = document.getElementById('searchResults');
    if(q.length > 2) {
        const d = await api(`/search/multi?query=${q}`);
        res.innerHTML = "";
        d.results.forEach(i => {
            if(!i.poster_path) return;
            const c = document.createElement('div');
            c.className = 'card';
            c.innerHTML = `<img src="${POSTER + i.poster_path}">`;
            c.onclick = () => { toggleSearch(); openItem(i); };
            res.appendChild(c);
        });
    }
};

window.onscroll = () => {
    const n = document.getElementById('nav');
    window.scrollY > 50 ? n.classList.add('scrolled') : n.classList.remove('scrolled');
};

init();
</script>
</body>
</html>
