<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZM FLIX</title>

    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
            --card-width: 240px;
            --card-height: 135px; /* 16:9 Aspect Ratio */
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            margin: 0;
            background: var(--netflix-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            box-sizing: border-box;
            transition: background-color 0.5s ease;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
        }

        header.scrolled {
            background-color: #000;
        }

        header h2 {
            color: var(--netflix-red);
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        #search {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 4px;
            color: white;
            width: 180px;
            outline: none;
            transition: width 0.3s ease;
        }

        #search:focus {
            width: 250px;
            border-color: white;
            background: rgba(0,0,0,0.8);
        }

        /* --- HERO --- */
        .hero {
            height: 85vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background-size: cover;
            background-position: center 20%;
            position: relative;
            margin-bottom: 20px;
        }

        .hero::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 30%;
            background: linear-gradient(to top, var(--netflix-black), transparent);
        }

        .heroContent {
            position: relative;
            z-index: 2;
            max-width: 650px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4rem);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .hero p {
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 20px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .heroButtons {
            display: flex;
            gap: 12px;
        }

        .playBtn, .infoBtn {
            padding: 12px 28px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .playBtn { background: white; color: black; }
        .infoBtn { background: rgba(109, 109, 110, 0.7); color: white; }
        .playBtn:hover, .infoBtn:hover { opacity: 0.75; }

        /* --- ROWS --- */
        .section {
            padding: 0 4%;
            margin-top: 30px;
        }

        .section h3 {
            margin-bottom: 10px;
            font-size: 1.3rem;
            color: #e5e5e5;
            font-weight: 500;
        }

        .row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 20px 0; /* Space for hover scale */
        }

        .row::-webkit-scrollbar { display: none; }

        /* --- CARD --- */
        .card {
            min-width: var(--card-width);
            height: var(--card-height);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
            background: #2f2f2f;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card:hover {
            transform: scale(1.3);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .cardOverlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .card:hover .cardOverlay { opacity: 1; }

        /* --- PLAYER --- */
        .player {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--netflix-black);
            z-index: 9999;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .videoBox {
            width: 100%;
            background: black;
            position: relative;
            padding-top: 56.25%; /* 16:9 */
        }

        .videoBox iframe {
            position: absolute;
            top: 0; width: 100%; height: 100%;
            border: none;
        }

        .playerTop {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 5;
        }

        .backBtn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .backBtn:hover { background: rgba(255,255,255,0.2); }

        .playerDetails { padding: 40px 5%; }
        .meta { color: #46d369; font-weight: bold; margin: 10px 0; }
        
        /* EPISODES */
        .episodes { padding: 0 5% 40px; display: flex; flex-direction: column; gap: 15px; }
        .episode {
            display: flex; gap: 20px;
            background: #232323;
            padding: 15px; border-radius: 4px;
            cursor: pointer; transition: 0.3s;
        }
        .episode:hover { background: #333; }
        .episode img { width: 180px; height: 100px; object-fit: cover; border-radius: 2px; }

        /* MOBILE */
        @media(max-width: 768px){
            .hero { height: 60vh; }
            .hero h1 { font-size: 2rem; }
            .card { min-width: 160px; height: 90px; }
            .episode img { width: 120px; height: 70px; }
        }
    </style>
</head>

<body>

<header id="mainHeader">
    <h2>NZM FLIX</h2>
    <input id="search" type="text" placeholder="Titles, people, genres">
</header>

<div class="hero" id="hero"></div>

<div id="content-rows">
    <div class="section">
        <h3>Trending Now</h3>
        <div class="row" id="trending"></div>
    </div>

    <div class="section">
        <h3>Continue Watching</h3>
        <div class="row" id="continue"></div>
    </div>

    <div class="section">
        <h3>Blockbuster Movies</h3>
        <div class="row" id="top"></div>
    </div>

    <div class="section">
        <h3>Action & Adventure</h3>
        <div class="row" id="action"></div>
    </div>

    <div class="section">
        <h3>Comedies</h3>
        <div class="row" id="comedy"></div>
    </div>

    <div class="section">
        <h3>Binge-Worthy TV Shows</h3>
        <div class="row" id="tv"></div>
    </div>
</div>

<div class="player" id="player">
    <div class="videoBox">
        <div class="playerTop">
            <button class="backBtn" onclick="closePlayer()">✕</button>
        </div>
        <iframe id="frame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="playerDetails" id="playerDetails"></div>
    <div style="padding: 0 5%;">
        <select class="seasonSelect" id="season" style="padding: 10px; background: #333; color: white; border: none;"></select>
    </div>
    <div class="episodes" id="episodes"></div>
</div>

<script>
    const API = "2f7637ba9b3253a84483afa03480473a";
    const IMG = "https://image.tmdb.org/t/p/original";
    const THUMB = "https://image.tmdb.org/t/p/w500"; // Smaller for row performance

    // Navbar Scroll Effect
    window.addEventListener('scroll', () => {
        const header = document.getElementById('mainHeader');
        if (window.scrollY > 50) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    });

    async function get(u) {
        const res = await fetch(u);
        return res.json();
    }

    async function loadHome() {
        const trending = await get(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}`);
        display(trending.results, "trending");
        setHero(trending.results[0]);

        const top = await get(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API}`);
        display(top.results, "top");

        const action = await get(`https://api.themoviedb.org/3/discover/movie?api_key=${API}&with_genres=28`);
        display(action.results, "action");

        const comedy = await get(`https://api.themoviedb.org/3/discover/movie?api_key=${API}&with_genres=35`);
        display(comedy.results, "comedy");

        const tv = await get(`https://api.themoviedb.org/3/trending/tv/day?api_key=${API}`);
        display(tv.results, "tv");

        loadContinue();
    }

    function setHero(i) {
        const hero = document.getElementById("hero");
        hero.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.8) 10%, transparent 60%), url(${IMG + i.backdrop_path})`;
        hero.innerHTML = `
            <div class="heroContent">
                <h1>${i.title || i.name}</h1>
                <p>${i.overview || ""}</p>
                <div class="heroButtons">
                    <button class="playBtn" onclick='playHero(${JSON.stringify(i)})'><span>▶</span> Play</button>
                    <button class="infoBtn" onclick="openPlayer(${JSON.stringify(i).replace(/"/g, '&quot;')})"><span>ⓘ</span> More Info</button>
                </div>
            </div>
        `;
    }

    function display(list, id) {
        const row = document.getElementById(id);
        row.innerHTML = "";
        list.forEach(i => {
            if (!i.backdrop_path) return;
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${THUMB + i.backdrop_path}" loading="lazy">
                <div class="cardOverlay">
                    <div style="font-weight:bold; font-size:14px;">${i.title || i.name}</div>
                </div>
            `;
            card.onclick = () => openPlayer(i);
            row.appendChild(card);
        });
    }

    function openPlayer(i) {
        const player = document.getElementById("player");
        player.style.display = "block";
        document.body.style.overflow = "hidden"; // Prevent background scroll

        document.getElementById("playerDetails").innerHTML = `
            <h1 style="font-size:3rem; margin:0;">${i.title || i.name}</h1>
            <div class="meta">${Math.round(i.vote_average * 10)}% Match • ${(i.release_date || i.first_air_date || "").slice(0, 4)}</div>
            <p style="font-size:1.2rem; max-width:800px; line-height:1.6;">${i.overview || ""}</p>
            <button class="playBtn" onclick="playNow(${i.id},'${i.first_air_date ? "tv" : "movie"}')">▶ Play Now</button>
        `;

        if (i.first_air_date) {
            loadTV(i.id);
        } else {
            document.getElementById("season").style.display = "none";
            document.getElementById("episodes").innerHTML = "";
        }
    }

    function playHero(i) {
        openPlayer(i);
        playNow(i.id, i.first_air_date ? "tv" : "movie");
    }

    function playNow(id, type, season = 1, episode = 1) {
        saveContinue(id, type, season, episode);
        const frame = document.getElementById("frame");
        // Using vidsrc as primary for better compatibility
        const url = type === "tv" 
            ? `https://vidsrc.to/embed/tv/${id}/${season}/${episode}` 
            : `https://vidsrc.to/embed/movie/${id}`;
        frame.src = url;
        window.scrollTo(0,0);
    }

    async function loadTV(id) {
        const data = await get(`https://api.themoviedb.org/3/tv/${id}?api_key=${API}`);
        const season = document.getElementById("season");
        season.style.display = "block";
        season.innerHTML = "";
        data.seasons.forEach(s => {
            if (s.season_number === 0) return;
            const o = document.createElement("option");
            o.value = s.season_number;
            o.text = "Season " + s.season_number;
            season.appendChild(o);
        });
        season.onchange = () => loadEpisodes(id, season.value);
        loadEpisodes(id, 1);
    }

    async function loadEpisodes(id, seasonNum) {
        const data = await get(`https://api.themoviedb.org/3/tv/${id}/season/${seasonNum}?api_key=${API}`);
        const box = document.getElementById("episodes");
        box.innerHTML = "";
        data.episodes.forEach(e => {
            const div = document.createElement("div");
            div.className = "episode";
            div.onclick = () => playNow(id, "tv", seasonNum, e.episode_number);
            div.innerHTML = `
                <img src="${e.still_path ? THUMB + e.still_path : ''}">
                <div>
                    <div style="font-weight:bold;">${e.episode_number}. ${e.name}</div>
                    <p style="font-size:13px; color:#aaa; margin-top:5px;">${e.overview || "No description available."}</p>
                </div>
            `;
            box.appendChild(div);
        });
    }

    function closePlayer() {
        document.getElementById("player").style.display = "none";
        document.getElementById("frame").src = "";
        document.body.style.overflow = "auto";
    }

    document.getElementById("search").addEventListener("input", async e => {
        const q = e.target.value;
        if (q.length < 3) return;
        const data = await get(`https://api.themoviedb.org/3/search/multi?api_key=${API}&query=${q}`);
        display(data.results, "trending"); // Overwrite first row for search
        document.querySelector('.section h3').innerText = "Search Results";
    });

    function saveContinue(id, type, season, ep) {
        let data = JSON.parse(localStorage.getItem("continue") || "[]");
        data = data.filter(item => item.id !== id); // Remove duplicate
        data.unshift({ id, type, season, ep });
        localStorage.setItem("continue", JSON.stringify(data.slice(0, 10)));
        loadContinue();
    }

    async function loadContinue() {
        const list = JSON.parse(localStorage.getItem("continue") || "[]");
        const row = document.getElementById("continue");
        row.innerHTML = "";
        if (list.length === 0) {
            row.parentElement.style.display = "none";
            return;
        }
        row.parentElement.style.display = "block";
        for (const i of list) {
            try {
                const d = await get(`https://api.themoviedb.org/3/${i.type}/${i.id}?api_key=${API}`);
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `<img src="${THUMB + d.backdrop_path}"><div class="cardOverlay"><b>${d.title || d.name}</b></div>`;
                card.onclick = () => {
                    openPlayer(d);
                    playNow(i.id, i.type, i.season, i.ep);
                };
                row.appendChild(card);
            } catch(e) {}
        }
    }

    loadHome();
</script>

</body>
</html>
