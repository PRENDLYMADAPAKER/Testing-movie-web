<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer-when-downgrade">
<title>NZM FLIX | Elite Edition</title>
<style>
:root { 
    --red: #E50914; --bg: #000; 
    --card-w: clamp(145px, 15vw, 200px); 
    --card-h: calc(var(--card-w) * 1.5);
}
body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

#loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.6s; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(229, 9, 20, 0.1); border-top: 4px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 20px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: 0.3s; }
header.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
.logo { color: var(--red); font-size: 28px; font-weight: 900; cursor: pointer; outline: none; }

.card:focus, .btn-red:focus, .srv-btn:focus, .logo:focus, .search-icon:focus, .ep-card:focus {
    outline: 3px solid white; transform: scale(1.08); z-index: 100; box-shadow: 0 0 25px var(--red);
}

.hero { height: 75vh; background: center top/cover; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%); }
.hero-body { position: relative; z-index: 10; max-width: 700px; }
.hero-body h1 { font-size: clamp(2.2rem, 6vw, 3.5rem); margin: 0; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

.section { padding: 35px 0 0 5%; }
.section h3 { font-size: 1.3rem; margin-bottom: 10px; color: #e5e5e5; display: flex; justify-content: space-between; align-items: center; padding-right: 5%; }
.row { display: flex; gap: 18px; overflow-x: auto; padding: 15px 0 30px; scrollbar-width: none; scroll-behavior: smooth; }
.row::-webkit-scrollbar { display: none; }

.card { min-width: var(--card-w); width: var(--card-w); cursor: pointer; border-radius: 6px; transition: 0.3s; position: relative; outline: none; }
.card img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 6px; background: #111; pointer-events: none; }
.card-name { font-size: 13px; margin-top: 10px; text-align: center; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-status { position: absolute; top: 10px; right: 10px; background: var(--red); font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: bold; z-index: 2; }

.buffer-bg { height: 4px; background: #333; width: 100%; margin-top: -4px; border-radius: 0 0 4px 4px; overflow: hidden; position: relative; z-index: 1; }
.buffer-fill { height: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); }

.modal { position: fixed; inset: 0; background: #000; z-index: 2500; display: none; overflow-y: auto; }
.modal-content { display: flex; flex-direction: column; width: 100%; }
@media (min-width: 1024px) {
    .modal-content { flex-direction: row-reverse; padding: 80px 5%; gap: 50px; align-items: flex-start; }
    .video-wrap { width: 60% !important; position: sticky; top: 100px; border-radius: 12px; overflow: hidden; }
    .info-wrap { flex: 1; }
}

.video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; z-index: 100; }
iframe { width: 100%; height: 100%; border: none; }

.btn-red { background: var(--red); color: white; width: 100%; padding: 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; outline: none; }
.srv-bar { display: flex; gap: 10px; margin: 15px 0; overflow-x: auto; scrollbar-width: none; }
.srv-btn { background: #222; color: #888; padding: 10px 20px; border-radius: 5px; border: 1px solid #333; cursor: pointer; outline: none; }
.srv-btn.active { background: var(--red); color: white; border-color: var(--red); }

.ep-card { display: flex; gap: 15px; padding: 12px; background: #111; border-radius: 8px; margin-bottom: 10px; cursor: pointer; outline: none; }
.ep-card.playing { border-left: 4px solid var(--red); background: #1a1a1a; }
.ep-thumb { width: 130px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; background: #222; }
.close-btn { position: fixed; top: 20px; right: 20px; z-index: 3000; background: rgba(0,0,0,0.8); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 22px; }

#searchView { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; padding: 110px 5% 50px; overflow-y: auto; }
.search-bar { width: 100%; max-width: 600px; display: block; margin: 0 auto 40px; padding: 15px 25px; background: #111; border: 2px solid #333; color: white; border-radius: 50px; font-size: 18px; outline: none; }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" tabindex="0" onclick="location.reload()">NZM FLIX</div>
    <div class="search-icon" tabindex="0" onclick="toggleSearch()" style="cursor:pointer; font-size: 24px; padding: 5px;">🔍</div>
</header>

<main id="home">
    <div id="hero" class="hero"></div>
    
    <div class="section" id="lastWatchedSec" style="display:none;">
        <h3>Last Watched <small onclick="clearHist()" style="font-size:12px; color:var(--red); cursor:pointer; margin-left:10px;">[Clear All]</small></h3>
        <div class="row" id="last-row"></div>
    </div>
    
    <div class="section"><h3>Top Philippines</h3><div class="row" id="ph-row"></div></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trend-row"></div></div>
    <div class="section"><h3>K-Drama</h3><div class="row" id="kdrama-row"></div></div>
    <div class="section"><h3>Asian</h3><div class="row" id="asian-row"></div></div>
    <div class="section"><h3>Comedy</h3><div class="row" id="comedy-row"></div></div>
    <div class="section"><h3>Action</h3><div class="row" id="action-row"></div></div>
    <div class="section"><h3>Sci-Fi</h3><div class="row" id="scifi-row"></div></div>
    <div class="section"><h3>Anime</h3><div class="row" id="anime-row"></div></div>
    <div class="section"><h3>Kids</h3><div class="row" id="kids-row"></div></div>
    <div class="section"><h3>Family</h3><div class="row" id="family-row"></div></div>
</main>

<div id="searchView">
    <input type="text" id="searchInput" class="search-bar" placeholder="Search movies or shows...">
    <div class="row" style="flex-wrap:wrap; justify-content:center; gap: 20px;" id="searchRes"></div>
</div>

<div class="modal" id="pModal">
    <button class="close-btn" onclick="closeM()">✕</button>
    <div class="modal-content">
        <div class="video-wrap" id="vidContainer"></div>
        <div class="info-wrap" style="padding: 20px;">
            <div id="meta"></div>
            <div class="srv-bar" id="serverBar">
                <button class="srv-btn active" tabindex="0" onclick="setSrv(1, this)">Server 1</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(2, this)">Server 2</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(3, this)">Server 3</button>
                <button class="srv-btn" tabindex="0" onclick="setSrv(4, this)">Server 4</button>
            </div>
            <div id="tvUI" style="display:none; margin-top:20px;">
                <select id="seasonSelect" onchange="loadEps()" style="width:100%; padding:15px; background:#222; color:white; border:none; border-radius:8px;"></select>
                <div id="epList" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a", IMG = "https://image.tmdb.org/t/p/original", POSTER = "https://image.tmdb.org/t/p/w500";
let active = null, srv = 1, curEp = {s:1, e:1};

// ----- Robust API with error handling -----
async function api(p) { 
    try {
        const res = await fetch(`https://api.themoviedb.org/3${p}${p.includes('?')?'&':'?'}api_key=${KEY}`);
        if(!res.ok) throw new Error(res.statusText);
        return res.json();
    } catch(e) { console.warn('API fetch failed:', p, e); return {}; }
}

// --- History Logic ---
function saveWatched(i, s=1, e=1, server=1){
    try {
        let list = JSON.parse(localStorage.getItem('nzm_history')||'[]').filter(x=>x.id!==i.id);
        i.lastS=s; i.lastE=e; i.lastSrv=server; i.timestamp=Date.now();
        list.unshift(i); localStorage.setItem('nzm_history', JSON.stringify(list.slice(0,20)));
        renderHistory();
    } catch(err){ console.error(err); }
}
function renderHistory(){
    const list = JSON.parse(localStorage.getItem('nzm_history')||'[]');
    const row = document.getElementById('last-row');
    if(list.length>0){
        document.getElementById('lastWatchedSec').style.display='block';
        row.innerHTML='';
        list.forEach(i=>{
            const c=document.createElement('div'); c.className='card'; c.tabIndex=0;
            const label = i.first_air_date ? `S${i.lastS}:E${i.lastE}` : 'Movie';
            const progress = i.first_air_date ? (i.lastE/15)*100 : 85;
            c.innerHTML=`<img src="${POSTER+i.poster_path}">
                <div class="buffer-bg"><div class="buffer-fill" style="width:${Math.min(progress,100)}%"></div></div>
                <div class="card-status">${label}</div>
                <div class="card-name">${i.title||i.name}</div>`;
            c.onclick=()=>{ curEp={s:i.lastS||1,e:i.lastE||1}; srv=i.lastSrv||1; openM(i,true); };
            row.appendChild(c);
        });
    } else document.getElementById('lastWatchedSec').style.display='none';
}
function clearHist(){ if(confirm("Clear all history?")){ localStorage.removeItem('nzm_history'); renderHistory(); } }
    <script>
// ----- Modal / Player Logic -----
function openM(item, resume=false){
    active = item;
    document.getElementById('pModal').style.display='block';
    document.getElementById('vidContainer').innerHTML='';
    document.getElementById('tvUI').style.display = item.first_air_date ? 'block' : 'none';
    document.getElementById('seasonSelect').innerHTML='';
    if(item.first_air_date){
        for(let s=1;s<=item.seasons;s++){
            const opt=document.createElement('option'); opt.value=s; opt.text=`Season ${s}`;
            document.getElementById('seasonSelect').appendChild(opt);
        }
        document.getElementById('seasonSelect').value = curEp.s;
        loadEps();
    }
    renderMeta(item);
    if(!resume) curEp={s:1,e:1};
    setSrv(srv);
}

function closeM(){ document.getElementById('pModal').style.display='none'; document.getElementById('vidContainer').innerHTML=''; }

// ----- Episodes & TV logic -----
function loadEps(){
    const season = +document.getElementById('seasonSelect').value;
    curEp.s=season;
    const epList=document.getElementById('epList'); epList.innerHTML='';
    const eps=active.episodes[season-1]||[];
    eps.forEach((e,i)=>{
        const div=document.createElement('div'); div.className='ep-card'; div.tabIndex=0;
        if(i+1===curEp.e) div.classList.add('playing');
        div.innerHTML=`<img src="${POSTER+(e.still_path||active.poster_path)}" class="ep-thumb">
                       <div><strong>${e.name}</strong><br><small>${e.air_date||''}</small></div>`;
        div.onclick=()=>{ curEp.e=i+1; setSrv(srv); };
        epList.appendChild(div);
    });
}

// ----- Server Logic -----
function setSrv(n, btn=null){
    srv=n;
    document.querySelectorAll('.srv-btn').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    if(!active) return;
    const vid = document.createElement('iframe');
    let link = '';
    if(active.first_air_date){ // TV series
        link = active.episodes[curEp.s-1][curEp.e-1]?.servers?.[`server${srv}`] || active.episodes[curEp.s-1][curEp.e-1]?.link;
    } else link = active.servers?.[`server${srv}`] || active.link;
    if(!link) link=active.link||active.trailer;
    vid.src = link; vid.allow='autoplay; fullscreen'; vid.setAttribute('allowfullscreen','');
    const container=document.getElementById('vidContainer'); container.innerHTML=''; container.appendChild(vid);
    saveWatched(active, curEp.s, curEp.e, srv);
}

// ----- Meta Rendering -----
function renderMeta(item){
    const meta=document.getElementById('meta');
    meta.innerHTML = `<h2>${item.title||item.name}</h2>
                      <p>${item.overview||'No description available.'}</p>
                      <small>Rating: ${item.vote_average||'N/A'}/10 | Release: ${item.release_date||item.first_air_date||'N/A'}</small>`;
}

// ----- Search -----
function toggleSearch(){ 
    const s=document.getElementById('searchView'); s.style.display=s.style.display==='block'?'none':'block'; 
    if(s.style.display==='block') document.getElementById('searchInput').focus();
}
document.getElementById('searchInput').addEventListener('input', async (e)=>{
    const q=e.target.value.trim(); const resDiv=document.getElementById('searchRes'); resDiv.innerHTML='';
    if(!q) return;
    const data = await api(`/search/multi?query=${encodeURIComponent(q)}`);
    (data.results||[]).forEach(i=>{
        const c=document.createElement('div'); c.className='card'; c.tabIndex=0;
        c.innerHTML=`<img src="${POSTER+(i.poster_path||i.backdrop_path)}">
                     <div class="card-name">${i.title||i.name}</div>`;
        c.onclick=()=>{ active=i; curEp={s:1,e:1}; openM(i); };
        resDiv.appendChild(c);
    });
});

// ----- Init / Populate UI -----
async function init(){
    try{
        renderHistory();
        const heroData=await api('/movie/popular');
        if(heroData.results && heroData.results.length){
            const h=heroData.results[0];
            const hero=document.getElementById('hero'); hero.style.backgroundImage=`url(${IMG+h.backdrop_path})`;
            hero.innerHTML=`<div class="hero-body"><h1>${h.title}</h1>
                            <button class="btn-red" onclick="active=${JSON.stringify(h)}; openM(${JSON.stringify(h)})">Watch Now</button></div>`;
        }
        const sections = [
            {id:'ph-row',api:'/discover/movie?with_original_language=tl'},
            {id:'trend-row',api:'/trending/all/week'},
            {id:'kdrama-row',api:'/discover/tv?with_genres=18&with_origin_country=KR'},
            {id:'asian-row',api:'/discover/tv?with_origin_country=JP'},
            {id:'comedy-row',api:'/discover/movie?with_genres=35'},
            {id:'action-row',api:'/discover/movie?with_genres=28'},
            {id:'scifi-row',api:'/discover/movie?with_genres=878'},
            {id:'anime-row',api:'/discover/tv?with_genres=16'},
            {id:'kids-row',api:'/discover/tv?with_genres=10762'},
            {id:'family-row',api:'/discover/movie?with_genres=10751'}
        ];
        for(const s of sections){
            const row=document.getElementById(s.id); row.innerHTML='';
            const d=await api(s.api);
            (d.results||[]).forEach(i=>{
                const c=document.createElement('div'); c.className='card'; c.tabIndex=0;
                c.innerHTML=`<img src="${POSTER+(i.poster_path||i.backdrop_path)}"><div class="card-name">${i.title||i.name}</div>`;
                c.onclick=()=>{ active=i; curEp={s:1,e:1}; openM(i); };
                row.appendChild(c);
            });
        }
    } catch(e){ console.error('Init error',e); }
    document.getElementById('loader').style.opacity=0;
    setTimeout(()=>document.getElementById('loader').style.display='none',600);
}

// ----- Scroll header -----
window.addEventListener('scroll', ()=>{ document.getElementById('nav').classList.toggle('scrolled', window.scrollY>20); });

init();
</script>
</body>
</html>
