<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>NZM FLIX | Premium Multi-Device</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000; 
            --card-w: clamp(140px, 15vw, 200px); 
            --card-h: calc(var(--card-w) * 1.5);
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }

        /* HEADER & SEARCH */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: background 0.3s;
        }
        header.scrolled { background: #000; border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: clamp(20px, 4vw, 28px); font-weight: 900; cursor: pointer; text-decoration: none; }
        
        .nav-tools { display: flex; gap: 20px; align-items: center; }
        .search-trigger { cursor: pointer; font-size: 22px; transition: 0.2s; }
        .search-trigger:hover { transform: scale(1.2); }

        /* SEARCH OVERLAY */
        #searchView { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 2500; display: none; padding: 100px 5%; overflow-y: auto; 
        }
        .search-input { 
            width: 100%; max-width: 800px; display: block; margin: 0 auto 40px;
            padding: 15px 30px; background: #1a1a1a; border: 2px solid #333;
            color: white; border-radius: 50px; font-size: 20px; outline: none;
        }
        .search-input:focus { border-color: var(--red); }

        /* HERO - PC & TV OPTIMIZED */
        .hero { height: 80vh; background: center/cover no-repeat; position: relative; display: flex; align-items: flex-end; padding: 0 5% 80px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 5%, transparent 70%), linear-gradient(to right, rgba(0,0,0,0.8), transparent); }
        .hero-body { position: relative; z-index: 10; max-width: 800px; }
        .hero-body h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; font-weight: 900; line-height: 1; }

        /* GRID SYSTEM (TV/PC FRIENDLY) */
        .section { padding: 40px 0 0 5%; }
        .row { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }
        
        .card { 
            min-width: var(--card-w); width: var(--card-w); 
            cursor: pointer; border-radius: 8px; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; outline: none;
        }
        .card:hover, .card:focus { transform: scale(1.1); z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 8px; background: #111; }
        .card-name { font-size: 14px; margin-top: 10px; text-align: center; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER MODAL */
        .modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; overflow-y: auto; }
        .modal-content { display: flex; flex-direction: column; width: 100%; }
        
        /* PC/TV Split Screen View */
        @media (min-width: 1024px) {
            .modal-content { flex-direction: row-reverse; padding: 80px 5%; gap: 40px; }
            .video-wrap { width: 60%; position: sticky; top: 100px; border-radius: 12px; overflow: hidden; }
            .info-wrap { flex: 1; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn { padding: 15px 30px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-red { background: var(--red); color: white; width: 100%; margin-top: 20px; }
        .btn-red:hover { background: #ff0f1b; }

        .close-btn { position: fixed; top: 25px; right: 25px; z-index: 4000; background: rgba(0,0,0,0.7); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<header id="navbar">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div class="nav-tools">
        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>
</header>

<main id="content">
    <div id="hero" class="hero"></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trending"></div></div>
    <div class="section"><h3>Philippines Top 10</h3><div class="row" id="philippines"></div></div>
    <div class="section"><h3>Anime Universe</h3><div class="row" id="anime"></div></div>
</main>

<div id="searchView">
    <button class="close-btn" onclick="closeSearch()">✕</button>
    <input type="text" id="searchInput" class="search-input" placeholder="Search movies, TV shows, anime...">
    <div class="row" style="flex-wrap: wrap; justify-content: center; gap: 20px;" id="searchRes"></div>
</div>

<div class="modal" id="pModal">
    <button class="close-btn" onclick="closeM()">✕</button>
    <div class="modal-content">
        <div class="video-wrap"><iframe id="mainFrame" allowfullscreen allow="autoplay"></iframe></div>
        <div class="info-wrap">
            <div id="metaContent"></div>
            <div id="tvControls" style="display:none; margin-top: 30px;">
                <select id="seasonSelect" onchange="loadEpisodes()" style="width:100%; padding:15px; background:#222; color:white; border:1px solid #444; border-radius:8px;"></select>
                <div id="episodeList" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let currentItem = null;

async function api(path) {
    const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}`);
    return r.json();
}

async function init() {
    const trending = await api('/trending/all/week');
    setHero(trending.results[0]);
    renderRow('trending', trending.results);
    renderRow('philippines', (await api('/trending/all/day?region=PH')).results);
    renderRow('anime', (await api('/discover/tv?with_genres=16')).results);
}

function renderRow(id, data) {
    const container = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.tabIndex = 0; // Makes it focusable for TV Remotes
        card.innerHTML = `<img src="${POSTER + i.poster_path}"><div class="card-name">${i.title || i.name}</div>`;
        card.onclick = () => openM(i);
        container.appendChild(card);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + i.backdrop_path})`;
    h.innerHTML = `
        <div class="hero-overlay"></div>
        <div class="hero-body">
            <h1>${i.title || i.name}</h1>
            <p style="font-size: 18px; color: #ddd; margin: 20px 0;">${i.overview.slice(0, 150)}...</p>
            <button class="btn btn-red" onclick='openM(${JSON.stringify(i).replace(/'/g,"")})' style="width:auto">▶ WATCH NOW</button>
        </div>`;
}

// SEARCH FUNCTIONS
function openSearch() {
    document.getElementById('searchView').style.display = "block";
    document.getElementById('searchInput').focus();
    document.body.style.overflow = "hidden";
}
function closeSearch() {
    document.getElementById('searchView').style.display = "none";
    document.body.style.overflow = "auto";
}

document.getElementById('searchInput').oninput = async (e) => {
    const q = e.target.value;
    if(q.length > 2) {
        const d = await api(`/search/multi?query=${q}`);
        const res = document.getElementById('searchRes');
        res.innerHTML = "";
        d.results.forEach(i => {
            if(!i.poster_path) return;
            const c = document.createElement('div');
            c.className = 'card';
            c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title||i.name}</div>`;
            c.onclick = () => { closeSearch(); openM(i); };
            res.appendChild(c);
        });
    }
};

// MODAL & PLAYER
async function openM(i) {
    currentItem = i;
    const m = document.getElementById('pModal');
    m.style.display = "block";
    document.body.style.overflow = "hidden";
    
    // Play trailer using KinoCheck (Bypasses YouTube Sign-in)
    document.getElementById('mainFrame').src = `https://kinocheck.com/embed/${i.id}`;

    document.getElementById('metaContent').innerHTML = `
        <h2 style="font-size: 32px; margin-bottom: 10px;">${i.title || i.name}</h2>
        <p style="color: #aaa; line-height: 1.6;">${i.overview}</p>
        <button class="btn btn-red" onclick="watchFull()">🎥 PLAY FULL CONTENT</button>
    `;

    if(i.first_air_date) {
        document.getElementById('tvControls').style.display = "block";
        const d = await api(`/tv/${i.id}`);
        const sel = document.getElementById('seasonSelect');
        sel.innerHTML = d.seasons.filter(s => s.season_number > 0).map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
        loadEpisodes();
    } else {
        document.getElementById('tvControls').style.display = "none";
    }
}

async function loadEpisodes() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await api(`/tv/${currentItem.id}/season/${s}`);
    const list = document.getElementById('episodeList');
    list.innerHTML = d.episodes.map(e => `
        <div style="display:flex; gap:15px; background:#111; padding:10px; border-radius:8px; margin-bottom:10px; cursor:pointer;" onclick="playEp(${s}, ${e.episode_number})">
            <img src="${POSTER+e.still_path}" style="width:120px; border-radius:4px;">
            <div><b>${e.episode_number}. ${e.name}</b><p style="font-size:12px; color:#666;">${e.overview.slice(0,80)}...</p></div>
        </div>
    `).join('');
}

function playEp(s, e) {
    const url = `https://vidsync.xyz/embed/tv/${currentItem.id}/${s}/${e}`;
    document.getElementById('mainFrame').src = url;
}

function watchFull() {
    const type = currentItem.first_air_date ? 'tv' : 'movie';
    const url = type === 'tv' 
        ? `https://vidsync.xyz/embed/tv/${currentItem.id}/1/1` 
        : `https://vidsync.xyz/embed/movie/${currentItem.id}`;
    document.getElementById('mainFrame').src = url;
}

function closeM() {
    document.getElementById('pModal').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.body.style.overflow = "auto";
}

window.onscroll = () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
};

init();
</script>
</body>
</html>
