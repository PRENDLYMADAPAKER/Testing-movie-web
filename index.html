<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Elite Edition 2026</title>
    <style>
        :root { --red: #E50914; --bg: #000; --card-w: 150px; --card-h: 220px; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; overflow-x: hidden; }
        
        /* HEADER & HERO */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 15px 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .logo { color: var(--red); font-size: 26px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; }
        .hero { height: 75vh; background: center/cover; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 90%); }
        .hero-body { position: relative; z-index: 10; max-width: 600px; }

        /* ROWS */
        .section { padding: 30px 0 0 5%; }
        .row { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }
        .card { min-width: var(--card-w); border-radius: 6px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 10px 5px; background: linear-gradient(transparent, #000); font-size: 11px; text-align: center; }

        /* PLAYER MODAL */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #111; position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { padding: 14px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 15px; margin-top: 10px; }
        .btn-red { background: var(--red); color: white; }
        .btn-gray { background: #333; color: white; }

        /* SERVER BAR */
        .srv-bar { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; }
        .srv-btn { background: #222; color: #888; padding: 8px 15px; border-radius: 4px; border: 1px solid #333; white-space: nowrap; font-size: 12px; cursor: pointer; }
        .srv-btn.active { background: var(--red); color: white; border-color: var(--red); }

        /* EPISODES */
        .ep-card { display: flex; gap: 12px; padding: 10px; background: #111; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .ep-thumb { width: 110px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        .close-x { position: fixed; top: 20px; right: 20px; z-index: 3000; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
</header>

<div id="hero" class="hero"></div>

<div class="section"><h3>🏆 Top Philippines Pick</h3><div class="row" id="row-ph"></div></div>
<div class="section"><h3>🔥 K-Drama Essentials</h3><div class="row" id="row-kdrama"></div></div>
<div class="section"><h3>🍿 Asian Hits (CN/TH)</h3><div class="row" id="row-asian"></div></div>
<div class="section"><h3>🎈 Kids & Family</h3><div class="row" id="row-kids"></div></div>

<div class="modal" id="modal">
    <button class="close-x" onclick="closeM()">✕</button>
    <div class="video-box" id="vArea"><iframe id="frame" allowfullscreen allow="autoplay"></iframe></div>
    <div style="padding: 20px 5%;">
        <div id="meta"></div>
        <div class="srv-bar">
            <button class="srv-btn active" onclick="setSrv(1, this)">Server 1</button>
            <button class="srv-btn" onclick="setSrv(2, this)">Server 2</button>
            <button class="srv-btn" onclick="setSrv(3, this)">Server 3</button>
            <button class="srv-btn" onclick="setSrv(4, this)">Server 4</button>
        </div>
        <div id="tvUI" style="display:none;">
            <select id="seasonSel" onchange="loadEps()" style="width:100%; padding:12px; background:#222; color:white; border:1px solid #444; border-radius:4px; margin-bottom:15px;"></select>
            <div id="epList"></div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let active = null, srv = 1, ep = { s: 1, e: 1 };

async function api(path) { return (await fetch(`https://api.themoviedb.org/3${path}${path.includes('?')?'&':'?'}api_key=${KEY}`)).json(); }

async function init() {
    const ph = await api('/trending/all/day?region=PH');
    setHero(ph.results[0]);
    fill('row-ph', ph.results);
    fill('row-kdrama', (await api('/discover/tv?with_original_language=ko')).results);
    fill('row-asian', (await api('/discover/tv?with_original_language=zh|th')).results);
    fill('row-kids', (await api('/discover/movie?with_genres=16,10751')).results);
}

function fill(id, data) {
    const r = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-info">${i.title || i.name}</div>`;
        c.onclick = () => openM(i);
        r.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + i.backdrop_path})`;
    h.innerHTML = `<div class="hero-overlay"></div><div class="hero-body"><h1>${i.title||i.name}</h1><p style="color:#ccc;">${i.overview.slice(0,120)}...</p><button class="btn btn-red" onclick='openM(${JSON.stringify(i).replace(/'/g,"")})' style="width:auto; padding: 12px 30px;">▶ Watch Now</button></div>`;
}

async function openM(i) {
    active = i; ep = { s: 1, e: 1 };
    document.getElementById('modal').style.display = "block";
    document.body.style.overflow = "hidden";
    
    // --- BYPASS YOUTUBE SIGN-IN BUG ---
    // We check KinoCheck first. It's a professional trailer embed that doesn't trigger the "bot" block.
    const f = document.getElementById('frame');
    f.src = `https://kinocheck.com/embed/${i.id}`; // KinoCheck auto-matches TMDB IDs

    document.getElementById('meta').innerHTML = `
        <h2 style="margin:0;">${i.title || i.name}</h2>
        <p style="color:#777; font-size:13px; margin: 10px 0;">${i.overview}</p>
        <button class="btn btn-red" onclick="watch(true)">🎬 PLAY FULL MOVIE / SERIES</button>
    `;

    if(i.first_air_date) {
        document.getElementById('tvUI').style.display = 'block';
        const d = await api(`/tv/${i.id}`);
        const sel = document.getElementById('seasonSel');
        sel.innerHTML = d.seasons.filter(s=>s.season_number>0).map(s=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
        loadEps();
    } else document.getElementById('tvUI').style.display = 'none';
}

async function loadEps() {
    const s = document.getElementById('seasonSel').value || 1;
    const d = await api(`/tv/${active.id}/season/${s}`);
    const list = document.getElementById('epList');
    list.innerHTML = d.episodes.map(e => `
        <div class="ep-card" onclick="playEp(${s},${e.episode_number})">
            <img class="ep-thumb" src="${e.still_path ? POSTER+e.still_path : ''}">
            <div style="flex:1"><b>${e.episode_number}. ${e.name}</b><p style="font-size:11px; color:#555; margin:5px 0 0;">${e.overview || 'No info.'}</p></div>
        </div>
    `).join('');
}

function playEp(s, e) { ep = { s, e }; watch(true); }

function setSrv(n, btn) {
    srv = n;
    document.querySelectorAll('.srv-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(!document.getElementById('frame').src.includes('kinocheck')) watch(true);
}

async function watch(fullscreen = false) {
    const f = document.getElementById('frame');
    const type = active.first_air_date ? 'tv' : 'movie';
    if(fullscreen) {
        const box = document.getElementById('vArea');
        if (box.requestFullscreen) await box.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(()=>{});
    }

    let url = "";
    if(srv === 1) url = `https://vidsync.xyz/embed/${type}/${active.id}${type==='tv'?`/${ep.s}/${ep.e}`:''}`;
    else if(srv === 2) url = `https://vidsrc.cc/v2/embed/${type}/${active.id}${type==='tv'?`/${ep.s}/${ep.e}`:''}`;
    else if(srv === 3) url = `https://multiembed.mov/?video_id=${active.id}&tmdb=1${type==='tv'?`&s=${ep.s}&e=${ep.e}`:''}`;
    else url = `https://vidsrc.pro/embed/${type}/${active.id}${type==='tv'?`/${ep.s}/${ep.e}`:''}`;

    f.src = url;
}

function closeM() {
    document.getElementById('modal').style.display='none';
    document.getElementById('frame').src='';
    document.body.style.overflow='auto';
    if(document.fullscreenElement) document.exitFullscreen();
}

init();
</script>
</body>
</html>
