<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZM FLIX</title>

<style>
body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);
}

#search{
background:rgba(255,255,255,.1);
border:none;
padding:8px 12px;
border-radius:4px;
color:white;
width:160px;
}

/* HERO */
.hero{
height:70vh;
display:flex;
align-items:flex-end;
padding:60px 20px;
background-size:cover;
}

/* ROW */
.section{padding:0 15px;margin-top:20px;}
.row{
display:flex;
gap:10px;
overflow-x:auto;
}
.row::-webkit-scrollbar{display:none}

/* CARD */
.card{
flex:0 0 auto;
width:140px;
height:200px;
border-radius:6px;
overflow:hidden;
position:relative;
background:#000;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* PREVIEW VIDEO */
.preview{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}

.card:hover .preview{
display:block;
}

/* MOBILE FIX (NO ZOOM BREAK) */
@media(max-width:600px){
.row{display:grid;grid-template-columns:repeat(3,1fr);}
.card{
width:100%;
height:160px;
}
}

/* PLAYER */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
z-index:9999;
}

.videoBox{
position:relative;
padding-top:56.25%;
}

.videoBox iframe{
position:absolute;
top:0;
width:100%;
height:100%;
border:none;
}

.controls{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

button{
background:#222;
color:white;
border:none;
padding:8px 10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>NZM FLIX</h2>
<input id="search" placeholder="Search...">
</header>

<div class="hero" id="hero"></div>

<div class="section">
<h3>Trending</h3>
<div class="row" id="trending"></div>
</div>

<div class="player" id="player">
<div class="videoBox">
<iframe id="frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
</div>

<div class="controls">
<button onclick="switchServer()">🔁 Server</button>
<button onclick="toggleSub()">💬 Subtitles</button>
<button onclick="closePlayer()">❌ Close</button>
</div>
</div>

 <script>
const API="YOUR_API_KEY";
const IMG="https://image.tmdb.org/t/p/w500";

let currentId,currentType,currentSeason=1,currentEp=1;
let serverIndex=0;
let subtitleOn=false;

/* CACHING */
async function fetchCached(url){
const cache=localStorage.getItem(url);
if(cache) return JSON.parse(cache);

const res=await fetch(url);
const data=await res.json();
localStorage.setItem(url,JSON.stringify(data));
return data;
}

/* LOAD HOME */
async function loadHome(){
const data=await fetchCached(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}`);
display(data.results,"trending");
setHero(data.results[0]);
}

/* HERO */
function setHero(i){
const hero=document.getElementById("hero");
hero.style.backgroundImage=`url(${IMG+i.backdrop_path})`;
hero.innerHTML=`
<h1>${i.title||i.name}</h1>
<button onclick="play(${i.id},'${i.first_air_date?'tv':'movie'}')">▶ Play</button>
`;
}

/* DISPLAY */
function display(list,id){
const row=document.getElementById(id);
row.innerHTML="";

list.forEach(i=>{
if(!i.poster_path) return;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${IMG+i.poster_path}">
<iframe class="preview" src="https://vidsrc.me/embed/movie/${i.id}" muted></iframe>
`;

div.onclick=()=>play(i.id,i.first_air_date?"tv":"movie");
row.appendChild(div);
});
}

/* SERVERS */
function getSources(){
return [
currentType==="tv"
?`https://vidsrc.me/embed/tv/${currentId}/${currentSeason}/${currentEp}`
:`https://vidsrc.me/embed/movie/${currentId}`,

currentType==="tv"
?`https://multiembed.mov/?video_id=${currentId}&tmdb=1&s=${currentSeason}&e=${currentEp}`
:`https://multiembed.mov/?video_id=${currentId}&tmdb=1`,

currentType==="tv"
?`https://vidsrc.to/embed/tv/${currentId}/${currentSeason}/${currentEp}`
:`https://vidsrc.to/embed/movie/${currentId}`
];
}

/* PLAY */
function play(id,type){
currentId=id;
currentType=type;
serverIndex=0;
openPlayer();
loadVideo();
}

/* LOAD VIDEO */
function loadVideo(){
const frame=document.getElementById("frame");
let src=getSources()[serverIndex];

if(subtitleOn) src+="&subtitles=on";

frame.src=src;
}

/* SWITCH SERVER */
function switchServer(){
serverIndex++;
if(serverIndex>2) serverIndex=0;
loadVideo();
}

/* SUBTITLE */
function toggleSub(){
subtitleOn=!subtitleOn;
loadVideo();
}

/* PLAYER */
function openPlayer(){
document.getElementById("player").style.display="flex";
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",async e=>{
const q=e.target.value;
if(q.length<2) return;

const data=await fetchCached(`https://api.themoviedb.org/3/search/multi?api_key=${API}&query=${q}`);
display(data.results,"trending");
});

loadHome();
</script>

</body>
</html>
