<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Elite 2026</title>
    <style>
        :root { 
            --red: #e50914; --bg: #050505; --card-w: 160px; --card-h: 90px;
            --glass: rgba(255, 255, 255, 0.1); --blur: blur(15px);
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        /* --- DYNAMIC HEADER --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; 
            justify-content: space-between; align-items: center; padding: 15px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.4s; box-sizing: border-box;
        }
        header.scrolled { background: rgba(0,0,0,0.8); backdrop-filter: var(--blur); padding: 10px 4%; }
        header h2 { color: var(--red); margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -1px; }

        /* --- HERO --- */
        .hero { height: 75vh; display: flex; align-items: center; padding: 0 4%; background-size: cover; background-position: center 20%; position: relative; }
        .hero::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: linear-gradient(to top, var(--bg), transparent); }
        .hero-info { position: relative; z-index: 2; max-width: 600px; }
        .hero-info h1 { font-size: clamp(2rem, 8vw, 3.5rem); margin: 0; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-p { background: white; color: black; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-m { background: rgba(109, 109, 110, 0.7); color: white; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; backdrop-filter: var(--blur); }

        /* --- ROWS --- */
        .section { padding: 20px 0 0 4%; }
        .section h3 { font-size: 1.2rem; margin-bottom: 8px; color: #fff; }
        .row { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }
        
        .card { 
            min-width: var(--card-w); height: var(--card-h); border-radius: 4px; 
            overflow: hidden; position: relative; cursor: pointer; transition: 0.3s ease;
        }
        .card:hover { transform: scale(1.1); z-index: 10; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        /* Movie Titles on Cards */
        .card-title {
            position: absolute; bottom: 0; width: 100%; padding: 6px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 11px; font-weight: bold; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- PLAYER & FULLSCREEN --- */
        .player-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; }
        
        /* Force Landscape Fullscreen */
        #vWrapper:fullscreen { width: 100vw; height: 100vh; }
        #vWrapper:-webkit-full-screen { width: 100vw; height: 100vh; }

        .details { padding: 25px 5%; }
        .ep-list { padding: 0 5% 50px; }
        .ep-item { 
            display: flex; gap: 12px; padding: 12px; border-radius: 8px; margin-bottom: 10px;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .ep-thumb { width: 120px; height: 68px; object-fit: cover; border-radius: 4px; }
        .ep-info b { font-size: 14px; display: block; margin-bottom: 4px; }
        .ep-info p { font-size: 11px; color: #aaa; line-height: 1.3; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .close-btn { position: fixed; top: 15px; left: 15px; z-index: 3000; background: rgba(0,0,0,0.5); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header id="nav">
    <h2 onclick="location.reload()">NZM FLIX</h2>
    <input id="search" placeholder="Search..." style="background:rgba(0,0,0,0.5); border:1px solid #444; color:white; padding:5px 12px; border-radius:20px; outline:none; width:100px;">
</header>

<div id="hero" class="hero"></div>

<div id="watchlist-sec" class="section" style="display:none;"><h3>My List</h3><div class="row" id="watchlist-row"></div></div>
<div class="section"><h3>Top 10 Philippines</h3><div class="row" id="trending-row"></div></div>
<div class="section"><h3>Recommended Anime</h3><div class="row" id="anime-row"></div></div>
<div class="section"><h3>K-Drama Favorites</h3><div class="row" id="kdrama-row"></div></div>

<div class="player-modal" id="player">
    <button class="close-btn" onclick="closePlayer()">✕</button>
    <div class="video-wrapper" id="vWrapper">
        <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="details" id="pDetails"></div>
    <div class="ep-list">
        <select id="seasonPicker" onchange="loadEps()" style="background:#222; color:white; border:1px solid #444; padding:10px; border-radius:4px; width:150px; margin-bottom:20px;"></select>
        <div id="epGrid"></div>
    </div>
</div>

<script>
const API = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const THUMB = "https://image.tmdb.org/t/p/w500";

let watchlist = JSON.parse(localStorage.getItem('nzm_list')) || [];
let lastWatched = JSON.parse(localStorage.getItem('nzm_last')) || null;
let currentShow = null;

async function api(path) {
    const res = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${API}`);
    return res.json();
}

async function init() {
    renderWatchlist();
    const t = await api('/trending/all/day?region=PH');
    setHero(lastWatched || t.results[0], !!lastWatched);
    fillRow(t.results, 'trending-row');
    
    const a = await api('/discover/tv?with_genres=16&with_original_language=ja');
    fillRow(a.results, 'anime-row');

    const k = await api('/discover/tv?with_genres=18&with_original_language=ko');
    fillRow(k.results, 'kdrama-row');
}

function fillRow(list, rowId) {
    const row = document.getElementById(rowId);
    list.forEach(i => {
        if(!i.backdrop_path) return;
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `<img src="${THUMB + i.backdrop_path}"><div class="card-title">${i.title || i.name}</div>`;
        c.onclick = () => openPlayer(i);
        row.appendChild(c);
    });
}

function setHero(i, isResume) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `linear-gradient(to right, var(--bg), transparent), url(${IMG + i.backdrop_path})`;
    h.innerHTML = `<div class="hero-info">
        <p style="color:#46d369; font-weight:bold;">${isResume ? 'Continue Watching' : 'Popular'}</p>
        <h1>${i.title || i.name}</h1>
        <div class="hero-btns">
            <button class="btn-p" onclick='openPlayer(${JSON.stringify(i).replace(/'/g,"")})'>▶ Play</button>
            <button class="btn-m" onclick='addToList(${JSON.stringify(i).replace(/'/g,"")})'>+ My List</button>
        </div>
    </div>`;
}

function addToList(i) {
    if(!watchlist.find(x => x.id === i.id)) watchlist.push(i);
    localStorage.setItem('nzm_list', JSON.stringify(watchlist));
    renderWatchlist();
}

function renderWatchlist() {
    if(watchlist.length === 0) return;
    document.getElementById('watchlist-sec').style.display = 'block';
    const row = document.getElementById('watchlist-row');
    row.innerHTML = "";
    fillRow(watchlist, 'watchlist-row');
}

async function openPlayer(i) {
    currentShow = i;
    localStorage.setItem('nzm_last', JSON.stringify(i));
    const modal = document.getElementById('player');
    const frame = document.getElementById('mainFrame');
    modal.style.display = "block";
    document.body.style.overflow = "hidden";
    
    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await api(`/${type}/${i.id}/videos`);
    const tr = v.results.find(x => x.type === "Trailer") || v.results[0];
    if(tr) frame.src = `https://www.youtube.com/embed/${tr.key}?autoplay=1&rel=0`;

    document.getElementById('pDetails').innerHTML = `
        <h2>${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:14px;">${i.overview}</p>
        <button onclick="playFull(${i.id}, '${type}')" style="background:#fff; color:#000; border:none; padding:15px; width:100%; font-weight:bold; border-radius:4px; cursor:pointer;">▶ PLAY NOW</button>
    `;

    if(type === 'tv') loadTVData(i.id);
    else { document.getElementById('seasonPicker').style.display='none'; document.getElementById('epGrid').innerHTML=""; }
}

async function loadTVData(id) {
    const d = await api(`/tv/${id}`);
    const sel = document.getElementById('seasonPicker');
    sel.style.display = 'block'; sel.innerHTML = "";
    d.seasons.forEach(s => {
        if(s.season_number > 0) sel.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`;
    });
    loadEps();
}

async function loadEps() {
    const sNum = document.getElementById('seasonPicker').value || 1;
    const d = await api(`/tv/${currentShow.id}/season/${sNum}`);
    const grid = document.getElementById('epGrid'); grid.innerHTML = "";
    d.episodes.forEach(e => {
        const item = document.createElement('div'); item.className = 'ep-item';
        item.onclick = () => playFull(currentShow.id, 'tv', sNum, e.episode_number);
        item.innerHTML = `<img class="ep-thumb" src="${THUMB + e.still_path}">
            <div class="ep-info"><b>${e.episode_number}. ${e.name}</b><p>${e.overview}</p></div>`;
        grid.appendChild(item);
    });
}

function playFull(id, type, s=1, e=1) {
    const frame = document.getElementById('mainFrame');
    const wrap = document.getElementById('vWrapper');
    
    // LANDSCAPE FULLSCREEN TRIGGER
    if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
    else if (wrap.msRequestFullscreen) wrap.msRequestFullscreen();

    frame.src = type === 'tv' 
        ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` 
        : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
}

function closePlayer() {
    document.getElementById('player').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.body.style.overflow = "auto";
}

window.onscroll = () => {
    const n = document.getElementById('nav');
    window.scrollY > 50 ? n.classList.add('scrolled') : n.classList.remove('scrolled');
};

init();
</script>
</body>
</html>
