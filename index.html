<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | PC Optimized</title>
    <style>
        :root { --red: #E50914; --bg: #000000; --card-w: 160px; --card-h: 230px; }
        @media (min-width: 1200px) { :root { --card-w: 200px; --card-h: 280px; } }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- LOADER --- */
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- NAV --- */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: 0.3s; }
        header.scrolled { background: var(--bg); padding: 10px 5%; border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: 26px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; }

        /* --- HERO --- */
        .hero { height: 70vh; background-size: cover; background-position: center top; position: relative; display: flex; align-items: flex-end; padding: 0 5% 50px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%); }
        .hero-body { position: relative; z-index: 10; max-width: 600px; }
        .hero-body h1 { font-size: clamp(2rem, 5vw, 3rem); margin: 0; font-weight: 800; }
        .btn { padding: 12px 24px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-white { background: white; color: black; }
        .btn-red { background: var(--red); color: white; width: 100%; max-width: 300px; justify-content: center; font-size: 18px; margin-bottom: 20px; }

        /* --- ROWS --- */
        .section { padding: 25px 0 0 5%; }
        .row { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scroll-behavior: smooth; }
        .row::-webkit-scrollbar { display: none; }
        .card { min-width: var(--card-w); height: var(--card-h); background: #111; cursor: pointer; transition: 0.3s; border-radius: 4px; overflow: hidden; }
        .card:hover { transform: scale(1.06); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- THE MODAL (STRICT PC FIX) --- */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        
        /* Mobile Default: Top-Down */
        .modal-content { display: flex; flex-direction: column; width: 100%; }

        @media (min-width: 1024px) {
            .modal-content { 
                flex-direction: row-reverse; /* Video right, Info left */
                padding: 80px 5%; gap: 40px; align-items: flex-start;
                max-width: 1300px; margin: 0 auto;
            }
            .video-wrap { 
                width: 350px !important; /* FIXED SMALL WIDTH FOR PC */
                flex-shrink: 0; position: sticky; top: 100px;
                border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            }
            .info-wrap { flex: 1; padding: 0 !important; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #111; }
        iframe { width: 100%; height: 100%; border: none; }
        .info-wrap { padding: 25px 5%; }
        .close-btn { position: fixed; top: 20px; right: 20px; z-index: 3000; background: rgba(0,0,0,0.7); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        /* EPISODES */
        .season-sel { background: #222; color: white; border: 1px solid #444; padding: 10px; border-radius: 4px; margin: 20px 0; width: 180px; }
        .ep-box { display: flex; gap: 15px; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; align-items: center; }
        .ep-box:hover { background: #111; }
        .ep-img { width: 130px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; background: #333; }
        .ep-txt b { display: block; font-size: 15px; margin-bottom: 4px; }
        .ep-txt p { font-size: 12px; color: #888; margin: 0; line-height: 1.3; }

        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; padding: 100px 5%; overflow-y: auto; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div onclick="toggleSearch()" style="cursor:pointer; font-size: 20px;">🔍</div>
</header>

<main>
    <div id="hero" class="hero"></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="row1"></div></div>
    <div class="section"><h3>Top K-Dramas</h3><div class="row" id="row2"></div></div>
    <div class="section"><h3>Popular Movies</h3><div class="row" id="row3"></div></div>
</main>

<div class="modal" id="playerModal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-content">
        <div class="video-wrap" id="playerWrap">
            <iframe id="mainPlayer" allow="autoplay; fullscreen"></iframe>
        </div>
        
        <div class="info-wrap">
            <div id="itemMeta"></div>
            <div id="tvExtras" style="display:none;">
                <select id="seasonSelect" class="season-sel" onchange="loadEpisodes()"></select>
                <div id="episodeList"></div>
            </div>
        </div>
    </div>
</div>

<div id="searchView">
    <input type="text" id="searchInput" placeholder="Search..." style="width:100%; padding:15px; background:#222; border:none; color:white; border-radius:8px;">
    <div class="row" style="flex-wrap: wrap;" id="searchRes"></div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let activeData = null;

async function api(path) {
    const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}`);
    return r.json();
}

async function init() {
    const ph = await api('/trending/all/day?region=PH');
    setHero(ph.results[0]);
    renderRow('row1', ph.results);
    renderRow('row2', (await api('/discover/tv?with_original_language=ko')).results);
    renderRow('row3', (await api('/discover/movie?with_genres=28')).results);

    setTimeout(() => {
        document.getElementById('loader').style.opacity = "0";
        setTimeout(() => document.getElementById('loader').style.display = "none", 500);
    }, 800);
}

function renderRow(id, data) {
    const container = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${POSTER + i.poster_path}">`;
        card.onclick = () => openModal(i);
        container.appendChild(card);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + i.backdrop_path})`;
    h.innerHTML = `<div class="hero-overlay"></div>
    <div class="hero-body">
        <h1>${i.title || i.name}</h1>
        <p style="color:#bbb; margin: 15px 0;">${i.overview.slice(0, 150)}...</p>
        <button class="btn btn-white" onclick='openModal(${JSON.stringify(i).replace(/'/g,"")})'>▶ Play Trailer</button>
    </div>`;
}

async function openModal(i) {
    activeData = i;
    const m = document.getElementById('playerModal');
    const p = document.getElementById('mainPlayer');
    m.style.display = "block";
    document.body.style.overflow = "hidden";

    const type = i.first_air_date ? 'tv' : 'movie';
    const videos = await api(`/${type}/${i.id}/videos`);
    const trailer = videos.results.find(v => v.type === "Trailer") || videos.results[0];
    if(trailer) p.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;

    document.getElementById('itemMeta').innerHTML = `
        <h2 style="font-size: 2.5rem; margin-bottom:10px;">${i.title || i.name}</h2>
        <div style="color:#46d369; font-weight:bold; margin-bottom:15px;">New Release • 2026</div>
        <p style="color:#aaa; line-height:1.5; margin-bottom:25px;">${i.overview}</p>
        <button class="btn btn-red" onclick="watchNow(${i.id}, '${type}')">▶ WATCH NOW</button>
    `;

    if(type === 'tv') {
        document.getElementById('tvExtras').style.display = 'block';
        const d = await api(`/tv/${i.id}`);
        const sel = document.getElementById('seasonSelect');
        sel.innerHTML = "";
        d.seasons.forEach(s => { if(s.season_number > 0) sel.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`; });
        loadEpisodes();
    } else {
        document.getElementById('tvExtras').style.display = 'none';
    }
}

async function loadEpisodes() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await api(`/tv/${activeData.id}/season/${s}`);
    const list = document.getElementById('episodeList');
    list.innerHTML = "";
    d.episodes.forEach(e => {
        const div = document.createElement('div');
        div.className = 'ep-box';
        div.onclick = () => watchNow(activeData.id, 'tv', s, e.episode_number);
        div.innerHTML = `<img class="ep-img" src="${e.still_path ? POSTER + e.still_path : ''}">
            <div class="ep-txt"><b>${e.episode_number}. ${e.name}</b><p>${e.overview.slice(0, 80)}...</p></div>`;
        list.appendChild(div);
    });
}

function watchNow(id, type, s=1, e=1) {
    const p = document.getElementById('mainPlayer');
    const wrap = document.getElementById('playerWrap');
    p.src = type === 'tv' ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
    if (wrap.requestFullscreen) wrap.requestFullscreen();
}

function closeModal() {
    document.getElementById('playerModal').style.display = "none";
    document.getElementById('mainPlayer').src = "";
    document.body.style.overflow = "auto";
}

function toggleSearch() {
    const s = document.getElementById('searchView');
    s.style.display = s.style.display === 'block' ? 'none' : 'block';
}

init();
</script>
</body>
</html>
