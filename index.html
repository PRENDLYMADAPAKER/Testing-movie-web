<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NZMflix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h2 class="logo">NZMflix</h2>
    <input type="text" id="search" placeholder="Search movies...">
  </header>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-content">
      <h1 id="hero-title">Welcome</h1>
      <p id="hero-desc">Click a movie to watch trailer</p>
    </div>
  </section>

  <!-- ROWS -->
  <section class="row">
    <h2>Popular</h2>
    <div class="row-posters" id="popular"></div>
  </section>

  <section class="row">
    <h2>Trending</h2>
    <div class="row-posters" id="trending"></div>
  </section>

  <section class="row">
    <h2>Action</h2>
    <div class="row-posters" id="action"></div>
  </section>

  <section class="row">
    <h2>Horror</h2>
    <div class="row-posters" id="horror"></div>
  </section>

  <section class="row">
    <h2>Favorites ❤️</h2>
    <div class="row-posters" id="favorites"></div>
  </section>

  <!-- SEARCH RESULTS -->
  <main id="search-results"></main>

  <!-- MODAL PLAYER -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close">&times;</span>
      <iframe id="player" frameborder="0" allowfullscreen></iframe>
      <button id="favBtn">❤️ Add to Favorites</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
