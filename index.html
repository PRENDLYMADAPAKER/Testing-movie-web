<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZM FLIX PREMIUM</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#141414;
 color:white;
 overflow-x:hidden;
}

/* HEADER */
header{
 position:fixed;
 top:0;
 width:100%;
 z-index:100;
 padding:10px 20px;
 display:flex;
 justify-content:space-between;
 background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);
}

/* HERO */
.hero{
 height:70vh;
 display:flex;
 flex-direction:column;
 justify-content:flex-end;
 padding:30px;
 background-size:cover;
 background-position:center;
 position:relative;
}

.hero::after{
 content:"";
 position:absolute;
 width:100%;
 height:100%;
 background:linear-gradient(to top,#141414,transparent);
}

/* GRID */
.section{padding:20px;margin-top:20px}
.grid{display:flex;gap:10px;overflow-x:auto}

/* CARD */
.card{
 min-width:160px;
 height:240px;
 border-radius:10px;
 overflow:hidden;
 position:relative;
 transition:.4s;
 cursor:pointer;
}
.card img{width:100%;height:100%;object-fit:cover}
.card:hover{transform:scale(1.2);z-index:10}

/* OVERLAY */
.overlay{
 position:absolute;
 bottom:0;
 width:100%;
 padding:10px;
 background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
 opacity:0;
 transition:.3s;
}
.card:hover .overlay{opacity:1}

/* PLAYER */
.player{
 position:fixed;
 top:0;
 width:100%;
 height:100%;
 background:black;
 display:none;
 flex-direction:column;
 z-index:999;
 overflow-y:auto;
}

/* VIDEO */
.videoWrapper{
 position:relative;
 width:100%;
 padding-top:56.25%;
}
.videoWrapper iframe{
 position:absolute;
 width:100%;
 height:100%;
}

/* DETAILS */
.details{padding:20px}

/* EPISODES */
.episodes{
 padding:20px;
 display:flex;
 flex-direction:column;
 gap:10px;
}
.episode-card{
 display:flex;
 gap:10px;
 background:#1f1f1f;
 border-radius:10px;
 padding:10px;
}
.episode-card img{
 width:120px;
 height:70px;
 object-fit:cover;
 border-radius:6px;
}

/* BUTTONS */
button{
 background:#e50914;
 border:none;
 padding:5px 10px;
 color:white;
 border-radius:5px;
}

/* MODAL */
.modal{
 position:fixed;
 bottom:-100%;
 left:0;
 width:100%;
 background:#222;
 padding:20px;
 border-radius:20px 20px 0 0;
 transition:.4s;
 z-index:1000;
}
.modal.show{bottom:0}

/* MOBILE */
@media(max-width:600px){
 .card{min-width:120px;height:180px}
}
</style>
</head>

<body>

<header>
<h3>NZM FLIX</h3>
<input id="search" placeholder="Search">
</header>

<div class="hero" id="hero"></div>

<div class="section"><h3>Trending</h3><div class="grid" id="trending"></div></div>
<div class="section"><h3>Top Rated</h3><div class="grid" id="top"></div></div>
<div class="section"><h3>Action</h3><div class="grid" id="action"></div></div>
<div class="section"><h3>Comedy</h3><div class="grid" id="comedy"></div></div>
<div class="section"><h3>Continue Watching</h3><div class="grid" id="continue"></div></div>

<div class="player" id="player">
<div style="padding:10px">
<button onclick="closePlayer()">Close</button>
<select id="season"></select>
</div>

<div class="videoWrapper">
<iframe id="frame"></iframe>
</div>

<div class="details" id="details"></div>
<div class="episodes" id="episodes"></div>
</div>

<div class="modal" id="modal"></div>

 <script>
const API_KEY="2f7637ba9b3253a84483afa03480473a";
const IMG="https://image.tmdb.org/t/p/original";

async function fetchData(u){return (await fetch(u)).json()}

/* HOME */
async function loadHome(){
 const t=await fetchData(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
 display(t.results,"trending");
 setHero(t.results[0]);
}

/* HERO */
function setHero(i){
 const h=document.getElementById("hero");
 h.style.backgroundImage=`url(${IMG+i.backdrop_path})`;
 h.innerHTML=`<h2>${i.title||i.name}</h2><p>${i.overview}</p>`;
}

/* DISPLAY */
function display(list,id){
 const c=document.getElementById(id);
 c.innerHTML="";
 list.forEach(i=>{
  if(!i.poster_path)return;

  const year=(i.release_date||i.first_air_date||"").split("-")[0];

  const d=document.createElement("div");
  d.className="card";

  d.innerHTML=`
  <img src="${IMG+i.poster_path}">
  <div class="overlay">
   <b>${i.title||i.name}</b><br>
   ⭐ ${i.vote_average} • ${year}
  </div>`;

  d.onclick=()=>openPlayer(i);
  c.appendChild(d);
 });
}

/* PLAYER */
function openPlayer(i){
 document.getElementById("player").style.display="flex";

 const year=(i.release_date||i.first_air_date||"").split("-")[0];

 document.getElementById("details").innerHTML=`
 <h2>${i.title||i.name}</h2>
 <button onclick="playNow(${i.id},'${i.first_air_date?"tv":"movie"}')">▶ Play Now</button>
 <button onclick="showDetails(${i.id},'${i.first_air_date?"tv":"movie"}')">ℹ Details</button>
 <p>${i.overview}</p>
 `;

 if(i.first_air_date){
  loadTV(i.id);
 }else{
  document.getElementById("season").style.display="none";
 }
}

/* PLAY */
function playNow(id,type){
 const f=document.getElementById("frame");

 f.src= type==="tv"
 ? `https://vidsrc.to/embed/tv/${id}/1/1`
 : `https://vidsrc.to/embed/movie/${id}`;

 if(f.requestFullscreen) f.requestFullscreen();
 if(screen.orientation) screen.orientation.lock("landscape").catch(()=>{});
}

/* TV */
async function loadTV(id){
 const d=await fetchData(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
 const s=document.getElementById("season");
 s.style.display="block";
 s.innerHTML="";

 d.seasons.forEach(x=>{
  const o=document.createElement("option");
  o.value=x.season_number;
  o.text="Season "+x.season_number;
  s.appendChild(o);
 });

 s.onchange=()=>loadEpisodes(id,s.value);
 loadEpisodes(id,s.value);
}

async function loadEpisodes(id,sn){
 const d=await fetchData(`https://api.themoviedb.org/3/tv/${id}/season/${sn}?api_key=${API_KEY}`);
 const box=document.getElementById("episodes");
 box.innerHTML="";

 d.episodes.forEach(e=>{
  const b=document.createElement("div");
  b.className="episode-card";

  b.innerHTML=`
  <img src="${e.still_path?IMG+e.still_path:""}">
  <div style="flex:1">
   <b>Ep ${e.episode_number}: ${e.name}</b>
   <p style="font-size:12px;opacity:.8;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;">
    ${e.overview}
   </p>

   <button onclick="playEpisode(${id},${sn},${e.episode_number})">▶ Play</button>
  </div>
  `;

  box.appendChild(b);
 });
}

/* PLAY EP */
function playEpisode(id,sn,ep){
 const f=document.getElementById("frame");
 f.src=`https://vidsrc.to/embed/tv/${id}/${sn}/${ep}`;

 if(f.requestFullscreen) f.requestFullscreen();
 if(screen.orientation) screen.orientation.lock("landscape").catch(()=>{});
}

/* DETAILS MODAL */
async function showDetails(id,type){
 const data=await fetchData(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&append_to_response=credits`);

 const cast=data.credits.cast.slice(0,5).map(c=>c.name).join(", ");
 const genres=data.genres.map(g=>g.name).join(", ");

 const modal=document.getElementById("modal");
 modal.innerHTML=`
 <h3>${data.title||data.name}</h3>
 <p><b>Genres:</b> ${genres}</p>
 <p><b>Cast:</b> ${cast}</p>
 <button onclick="closeModal()">Close</button>
 `;

 modal.classList.add("show");
}

function closeModal(){
 document.getElementById("modal").classList.remove("show");
}

/* CLOSE */
function closePlayer(){
 document.getElementById("player").style.display="none";
 document.getElementById("frame").src="";
}

/* INIT */
loadHome();
</script>

</body>
</html>
