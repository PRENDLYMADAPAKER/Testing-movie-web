<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Streaming App</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0c10;
  color: white;
}

header {
  padding: 15px;
  background: #111;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

input {
  padding: 8px;
  width: 200px;
  border-radius: 5px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
}

.player iframe {
  flex: 1;
  width: 100%;
  border: none;
}

.closeBtn {
  padding: 10px;
  background: red;
  text-align: center;
  cursor: pointer;
}
</style></head><body><header>
  <h2>My Streaming App</h2>
  <input type="text" id="search" placeholder="Search movies...">
</header><div class="grid" id="movies"></div><div class="player" id="player">
  <div class="closeBtn" onclick="closePlayer()">Close</div>
  <iframe id="frame" allowfullscreen></iframe>
</div><script>
const API_KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/w500";

async function loadMovies() {
  const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);
  const data = await res.json();
  displayMovies(data.results);
}

function displayMovies(movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  movies.forEach(movie => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${IMG + movie.poster_path}" />
    `;

    div.onclick = () => playMovie(movie.id);

    container.appendChild(div);
  });
}

function playMovie(id) {
  document.getElementById("player").style.display = "flex";
  document.getElementById("frame").src = `https://vidsync.xyz/embed/movie/${id}`;
}

function closePlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

// Search

document.getElementById("search").addEventListener("input", async (e) => {
  const query = e.target.value;

  if (query.length < 3) return loadMovies();

  const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}`);
  const data = await res.json();
  displayMovies(data.results);
});

loadMovies();
</script></body>
</html>
