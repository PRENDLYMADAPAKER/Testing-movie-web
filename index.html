<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>NZM FLIX | Smart Edition</title>
    <style>
        :root { --red: #E50914; --bg: #000; --card-w: clamp(145px, 15vw, 200px); --card-h: calc(var(--card-w) * 1.5); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(229, 9, 20, 0.2); border-top: 3px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 20px 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .logo { color: var(--red); font-size: 24px; font-weight: 900; cursor: pointer; }
        .hero { height: 70vh; background: center/cover; position: relative; display: flex; align-items: flex-end; padding: 60px 5%; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 5%, transparent 90%); }
        .section { padding: 30px 0 0 5%; }
        .row { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .card { min-width: var(--card-w); cursor: pointer; transition: 0.3s; position: relative; outline: none; }
        .card:focus { transform: scale(1.05); outline: 3px solid white; z-index: 5; }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 4px; }
        .prog-bar { position: absolute; bottom: 45px; left: 5px; right: 5px; height: 3px; background: #444; border-radius: 3px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--red); }
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn-red { background: var(--red); color: white; padding: 12px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin: 10px 0; width: 100%; }
        .ep-card { display: flex; gap: 10px; padding: 10px; background: #111; border-radius: 5px; margin-bottom: 8px; cursor: pointer; }
        .ep-card.active { border-left: 4px solid var(--red); background: #1a1a1a; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div onclick="toggleSearch()" style="cursor:pointer; font-size: 20px;">🔍</div>
</header>

<main>
    <div id="hero" class="hero"></div>
    <div class="section" id="histSec" style="display:none;"><h3>Continue Watching</h3><div class="row" id="histRow"></div></div>
    
    <div class="section"><h3>Top Philippines</h3><div class="row" id="ph-row"></div></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trend-row"></div></div>
    <div class="section"><h3>K-Drama</h3><div class="row" id="kdrama-row"></div></div>
    <div class="section"><h3>Asian</h3><div class="row" id="asian-row"></div></div>
    <div class="section"><h3>Comedy</h3><div class="row" id="comedy-row"></div></div>
    <div class="section"><h3>Action</h3><div class="row" id="action-row"></div></div>
    <div class="section"><h3>Sci-Fi</h3><div class="row" id="scifi-row"></div></div>
    <div class="section"><h3>Anime</h3><div class="row" id="anime-row"></div></div>
    <div class="section"><h3>Kids</h3><div class="row" id="kids-row"></div></div>
    <div class="section"><h3>Family</h3><div class="row" id="family-row"></div></div>
</main>

<div class="modal" id="pModal">
    <button onclick="history.back()" style="position:fixed; top:15px; right:15px; z-index:2100; background:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">✕</button>
    <div class="video-wrap" id="vArea"><iframe id="player" allowfullscreen></iframe></div>
    <div style="padding: 20px;">
        <div id="meta"></div>
        <div id="tvControls" style="display:none; margin-top:15px;">
            <select id="seasonPick" onchange="loadEps()" style="width:100%; padding:10px; background:#222; color:white; border:none;"></select>
            <div id="epList" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a", IMG = "https://image.tmdb.org/t/p/original", POSTER = "https://image.tmdb.org/t/p/w500";
let active = null, curEp = {s:1, e:1};

async function api(p) { return (await fetch(`https://api.themoviedb.org/3${p}${p.includes('?')?'&':'?'}api_key=${KEY}`)).json(); }

// SMART TRACKER LOGIC
function saveProgress(item, s = 1, e = 1) {
    let history = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    history = history.filter(x => x.id !== item.id);
    item.lastSeason = s;
    item.lastEpisode = e;
    item.watchedAt = Date.now();
    history.unshift(item);
    localStorage.setItem('nzm_history', JSON.stringify(history.slice(0, 20)));
    renderHistory();
}

function renderHistory() {
    const list = JSON.parse(localStorage.getItem('nzm_history') || '[]');
    const row = document.getElementById('histRow');
    if(list.length > 0) {
        document.getElementById('histSec').style.display = 'block';
        row.innerHTML = '';
        list.forEach(i => {
            const card = document.createElement('div'); card.className = 'card'; card.tabIndex = 0;
            const sub = i.first_air_date ? `S${i.lastSeason}:E${i.lastEpisode}` : 'Movie';
            card.innerHTML = `<img src="${POSTER+i.poster_path}"><div style="font-size:11px; color:var(--red); font-weight:bold; margin-top:5px;">${sub}</div><div style="font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${i.title||i.name}</div>`;
            card.onclick = () => { curEp = {s: i.lastSeason, e: i.lastEpisode}; openM(i); };
            row.appendChild(card);
        });
    }
}

async function init() {
    renderHistory();
    const tr = await api('/trending/all/week');
    setHero(tr.results[0]);
    fill('ph-row', (await api('/trending/all/day?region=PH')).results);
    fill('trend-row', tr.results);
    fill('kdrama-row', (await api('/discover/tv?with_original_language=ko&sort_by=popularity.desc')).results);
    fill('asian-row', (await api('/discover/tv?with_original_language=zh|ja|th&sort_by=popularity.desc')).results);
    fill('comedy-row', (await api('/discover/movie?with_genres=35')).results);
    fill('action-row', (await api('/discover/movie?with_genres=28')).results);
    fill('scifi-row', (await api('/discover/movie?with_genres=878')).results);
    fill('anime-row', (await api('/discover/tv?with_genres=16&with_original_language=ja')).results);
    fill('kids-row', (await api('/discover/tv?with_genres=10762')).results);
    fill('family-row', (await api('/discover/movie?with_genres=10751')).results);
    document.getElementById('loader').style.display = "none";
}

function fill(id, data) { const r = document.getElementById(id); data.forEach(i => {
    const c = document.createElement('div'); c.className = 'card'; c.tabIndex = 0;
    c.innerHTML = `<img src="${POSTER+i.poster_path}"><div style="font-size:13px; margin-top:5px; text-align:center;">${(i.title||i.name).slice(0,20)}</div>`;
    c.onclick = () => { curEp = {s:1, e:1}; openM(i); };
    r.appendChild(c);
});}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG+(i.backdrop_path || i.poster_path)})`;
    h.innerHTML = `<div class="hero-overlay"></div><div style="position:relative; z-index:10; max-width:600px;">
        <h1>${i.title||i.name}</h1>
        <button class="btn-red" style="width:auto; padding:12px 40px;" onclick='openM(${JSON.stringify(i).replace(/'/g,"")})'>WATCH NOW</button>
    </div>`;
}

async function openM(i) {
    active = i;
    history.pushState({mod:true}, "");
    document.getElementById('pModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
    
    const type = i.first_air_date ? 'tv' : 'movie';
    // Load YouTube Trailer first
    const v = await api(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === 'Trailer') || v.results[0];
    document.getElementById('player').src = trailer ? `https://www.youtube.com/embed/${trailer.key}?autoplay=1` : "";

    document.getElementById('meta').innerHTML = `<h2>${i.title||i.name}</h2><p style="color:#aaa; font-size:14px;">${i.overview}</p>
    <button class="btn-red" onclick="play()">🚀 START ${type.toUpperCase()}</button>`;

    if(type === 'tv') {
        document.getElementById('tvControls').style.display = 'block';
        const d = await api(`/tv/${i.id}`);
        document.getElementById('seasonPick').innerHTML = d.seasons.filter(s=>s.season_number>0).map(s=>`<option value="${s.season_number}" ${s.season_number==curEp.s?'selected':''}>Season ${s.season_number}</option>`).join('');
        loadEps();
    } else document.getElementById('tvControls').style.display = 'none';
}

async function loadEps() {
    const s = document.getElementById('seasonPick').value;
    const d = await api(`/tv/${active.id}/season/${s}`);
    document.getElementById('epList').innerHTML = d.episodes.map(e => `
        <div class="ep-card ${e.episode_number == curEp.e && s == curEp.s ? 'active' : ''}" onclick="playEp(${s},${e.episode_number})">
            <b>${e.episode_number}.</b> <span>${e.name}</span>
        </div>
    `).join('');
}

function playEp(s, e) { curEp = {s, e}; play(); }

function play() {
    saveProgress(active, curEp.s, curEp.e);
    const type = active.first_air_date ? 'tv' : 'movie';
    const url = `https://vidsync.xyz/embed/${type}/${active.id}${type==='tv'?`/${curEp.s}/${curEp.e}`:''}`;
    document.getElementById('player').src = url;
}

window.onpopstate = () => { 
    document.getElementById('pModal').style.display = 'none'; 
    document.getElementById('player').src = ""; 
    document.body.style.overflow = 'auto'; 
};

init();
</script>
</body>
</html>
