<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZM FLIX</title>

<style>
body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);
}

#search{
background:rgba(255,255,255,.15);
border:none;
padding:8px 12px;
border-radius:4px;
color:white;
outline:none;
}

/* HERO */
.hero{
height:85vh;
display:flex;
align-items:flex-end;
padding:60px 30px;
background-size:cover;
background-position:center;
position:relative;
}

.hero:after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,#141414,transparent);
}

.heroContent{
position:relative;
z-index:2;
max-width:500px;
}

.heroButtons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
padding:10px 20px;
border-radius:4px;
cursor:pointer;
}

.play{background:white;color:black}
.info{background:rgba(255,255,255,.2)}

/* ROW */
.section{padding:20px}
.row{
display:flex;
gap:10px;
overflow-x:auto;
}
.row::-webkit-scrollbar{display:none}

/* CARD */
.card{
min-width:150px;
height:220px;
border-radius:6px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:.3s;
}
.card img{
width:100%;
height:100%;
object-fit:cover;
}
.card:hover{
transform:scale(1.15);
z-index:5;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,black,transparent);
opacity:0;
}
.card:hover .overlay{opacity:1}

/* PLAYER */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#141414;
z-index:999;
display:none;
flex-direction:column;
overflow-y:auto;
}

/* VIDEO */
.videoBox{
position:relative;
width:100%;
padding-top:56.25%;
background:black;
}
.videoBox iframe{
position:absolute;
top:0;
width:100%;
height:100%;
}

/* CONTROLS */
.controls{
position:absolute;
top:10px;
left:10px;
z-index:5;
display:flex;
gap:5px;
}

.ctrlBtn{
background:rgba(0,0,0,.6);
border:none;
color:white;
padding:8px;
cursor:pointer;
}

/* DETAILS */
.details{padding:20px}

/* EPISODES */
.episodes{
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.episode{
display:flex;
gap:10px;
background:#1f1f1f;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.episode img{
width:140px;
height:80px;
object-fit:cover;
}

.episode p{
font-size:12px;
opacity:.8;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

/* SELECTS */
.selectBar{
display:flex;
gap:10px;
padding:0 20px;
}

select{
background:#222;
border:none;
color:white;
padding:8px;
}

/* SKIP INTRO */
.skipIntro{
position:absolute;
bottom:20px;
right:20px;
background:rgba(0,0,0,.7);
padding:10px;
cursor:pointer;
display:none;
}

/* MOBILE */
@media(max-width:600px){
.card{min-width:110px;height:160px}
.hero{height:70vh}
}
</style>
</head>

<body>

<header>
<h2>NZM FLIX</h2>
<input id="search" placeholder="Search">
</header>

<div class="hero" id="hero"></div>

<div class="section">
<h3>Trending</h3>
<div class="row" id="trending"></div>
</div>

<div class="section">
<h3>Top Rated</h3>
<div class="row" id="top"></div>
</div>

<div class="section">
<h3>Action</h3>
<div class="row" id="action"></div>
</div>

<div class="section">
<h3>Comedy</h3>
<div class="row" id="comedy"></div>
</div>

<div class="section">
<h3>TV Shows</h3>
<div class="row" id="tv"></div>
</div>

<div class="section">
<h3>Continue Watching</h3>
<div class="row" id="continue"></div>
</div>

<div class="player" id="player">

<div class="videoBox">

<div class="controls">
<button class="ctrlBtn" onclick="closePlayer()">←</button>
<button class="ctrlBtn" onclick="toggleSub()">CC</button>
<button class="ctrlBtn" onclick="nextEpisode()">Next</button>
</div>

<div class="skipIntro" id="skipIntro" onclick="skipIntro()">
Skip Intro
</div>

<iframe id="frame"
allowfullscreen
allow="autoplay; fullscreen; encrypted-media">
</iframe>

</div>

<div class="details" id="details"></div>

<div class="selectBar">
<select id="season"></select>
<select id="server">
<option value="1">Server 1</option>
<option value="2">Server 2</option>
<option value="3">Server 3</option>
</select>

<select id="quality">
<option value="auto">Auto</option>
<option value="1080">1080p</option>
<option value="720">720p</option>
<option value="480">480p</option>
</select>
</div>

<div class="episodes" id="episodes"></div>

</div>

<script>
const API="2f7637ba9b3253a84483afa03480473a";
const IMG="https://image.tmdb.org/t/p/original";

async function get(u){
return (await fetch(u)).json();
}

/* HOME */
async function loadHome(){

const t=await get(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}`);
display(t.results,"trending");
setHero(t.results[0]);

const top=await get(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API}`);
display(top.results,"top");

const act=await get(`https://api.themoviedb.org/3/discover/movie?api_key=${API}&with_genres=28`);
display(act.results,"action");

const com=await get(`https://api.themoviedb.org/3/discover/movie?api_key=${API}&with_genres=35`);
display(com.results,"comedy");

const tv=await get(`https://api.themoviedb.org/3/trending/tv/day?api_key=${API}`);
display(tv.results,"tv");

loadContinue();
}
 /* HERO */
function setHero(i){

const hero=document.getElementById("hero");

hero.style.backgroundImage=`url(${IMG+i.backdrop_path})`;

hero.innerHTML=`
<div class="heroContent">
<h1>${i.title||i.name}</h1>
<p>${i.overview||""}</p>

<div class="heroButtons">
<div class="btn play" id="heroPlay">▶ Play</div>
<div class="btn info" id="heroInfo">More Info</div>
</div>
</div>
`;

document.getElementById("heroPlay").onclick=()=>{
playNow(i.id,i.first_air_date?"tv":"movie")
};

document.getElementById("heroInfo").onclick=()=>{
openPlayer(i)
};

 }

/* DISPLAY */


/* PLAYER */
let currentId=0;
let currentType="movie";
let currentSeason=1;
let currentEpisode=1;

/* OPEN PLAYER */
async function openPlayer(i){

document.getElementById("player").style.display="flex";

currentId=i.id;
currentType=i.first_air_date?"tv":"movie";

document.getElementById("details").innerHTML=`
<h2>${i.title||i.name}</h2>
<p>${i.overview||""}</p>
<button onclick="playNow(${i.id},'${currentType}')">▶ Play</button>
`;

autoTrailer(i.id,currentType);

if(currentType==="tv"){
loadTV(i.id);
}elfunction display(list,id){

const row=document.getElementById(id);
row.innerHTML="";

list.forEach(i=>{

if(!i.poster_path) return;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${IMG+i.poster_path}">
<div class="overlay">${i.title||i.name}</div>
`;

card.onclick=()=>openPlayer(i);

row.appendChild(card);

});

 }se{
document.getElementById("episodes").innerHTML="";
}

}

/* AUTO TRAILER */
async function autoTrailer(id,type){

const res=await get(`https://api.themoviedb.org/3/${type}/${id}/videos?api_key=${API}`);

const trailer=res.results.find(v=>v.type==="Trailer");

if(!trailer) return;

document.getElementById("frame").src=
`https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1`;

}

/* PLAY */
function playNow(id,type,season=1,episode=1){

currentId=id;
currentType=type;
currentSeason=season;
currentEpisode=episode;

saveContinue(id,type,season,episode);

loadVideo();

}

/* VIDEO LOAD */
function loadVideo(){

const server=document.getElementById("server").value;

let url="";

if(server==1){

url=currentType==="tv"
?`https://vidsrc.xyz/embed/tv?tmdb=${currentId}&season=${currentSeason}&episode=${currentEpisode}`
:`https://vidsrc.xyz/embed/movie?tmdb=${currentId}`;

}

if(server==2){

url=currentType==="tv"
?`https://vidlink.pro/tv/${currentId}/${currentSeason}/${currentEpisode}`
:`https://vidlink.pro/movie/${currentId}`;

}

if(server==3){

url=currentType==="tv"
?`https://embed.su/embed/tv/${currentId}/${currentSeason}/${currentEpisode}`
:`https://embed.su/embed/movie/${currentId}`;

}

document.getElementById("frame").src=url;

/* SHOW SKIP INTRO */
document.getElementById("skipIntro").style.display="block";

}

/* NEXT EPISODE */
function nextEpisode(){

currentEpisode++;

loadVideo();

}

/* SKIP INTRO */
function skipIntro(){

const f=document.getElementById("frame");

try{
f.contentWindow.postMessage({type:"seek",time:85},"*");
}catch(e){}

}

/* SUBTITLE TOGGLE */
let sub=false;

function toggleSub(){

sub=!sub;

const f=document.getElementById("frame");

try{
f.contentWindow.postMessage({type:"subtitle",enabled:sub},"*");
}catch(e){}

}

/* TV */
async function loadTV(id){

const data=await get(`https://api.themoviedb.org/3/tv/${id}?api_key=${API}`);

const s=document.getElementById("season");
s.innerHTML="";

data.seasons.forEach(se=>{
const o=document.createElement("option");
o.value=se.season_number;
o.text="Season "+se.season_number;
s.appendChild(o);
});

s.onchange=()=>{
currentSeason=s.value;
loadEpisodes(id,s.value);
};

loadEpisodes(id,s.value);

}

/* EPISODES */
async function loadEpisodes(id,season){

const data=await get(`https://api.themoviedb.org/3/tv/${id}/season/${season}?api_key=${API}`);

const box=document.getElementById("episodes");
box.innerHTML="";

data.episodes.forEach(ep=>{

const div=document.createElement("div");
div.className="episode";

div.onclick=()=>{
currentEpisode=ep.episode_number;
playNow(id,"tv",season,ep.episode_number);
};

div.innerHTML=`
<img src="${ep.still_path?IMG+ep.still_path:""}">
<div>
<b>Episode ${ep.episode_number}</b>
<p>${ep.overview||""}</p>
</div>
`;

box.appendChild(div);

});

}

/* CLOSE */
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",async e=>{

const q=e.target.value;

if(q.length<2) return;

const data=await get(`https://api.themoviedb.org/3/search/multi?api_key=${API}&query=${q}`);

display(data.results,"trending");

});

/* CONTINUE WATCHING */
function saveContinue(id,type,season,episode){

const list=JSON.parse(localStorage.getItem("continue")||"[]");

list.unshift({id,type,season,episode});

localStorage.setItem("continue",JSON.stringify(list.slice(0,20)));

loadContinue();

}

async function loadContinue(){

const list=JSON.parse(localStorage.getItem("continue")||"[]");

const row=document.getElementById("continue");
row.innerHTML="";

for(const i of list){

const d=await get(`https://api.themoviedb.org/3/${i.type}/${i.id}?api_key=${API}`);

const card=document.createElement("div");
card.className="card";

card.innerHTML=`<img src="${IMG+d.poster_path}">`;

card.onclick=()=>{

openPlayer(d);
playNow(i.id,i.type,i.season,i.episode);

};

row.appendChild(card);

}

}

/* SERVER SWITCH */
document.getElementById("server").onchange=loadVideo;

/* INIT */
loadHome();
</script>

</body>
</html>
