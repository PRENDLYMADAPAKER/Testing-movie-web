<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeminiFlix</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>
body{background:#141414;font-family:Inter,sans-serif}
.scrollbar-hide::-webkit-scrollbar{display:none}
.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
.banner-fade-bottom{height:7.4rem;background-image:linear-gradient(180deg,transparent,rgba(37,37,37,.61),#141414)}
#player-container{aspect-ratio:16/9}
</style></head><body class="text-white"><nav class="fixed top-0 left-0 right-0 z-50 p-4 bg-black/70 backdrop-blur">
<h1 class="text-2xl font-bold text-red-600">GeminiFlix</h1>
</nav><header id="banner" class="relative bg-cover bg-center" style="height:56.25vw;max-height:700px">
<div class="ml-8 pt-48">
<h1 id="banner-title" class="text-5xl font-extrabold"></h1>
<p id="banner-description" class="w-1/2 mt-3"></p>
</div>
<div class="absolute bottom-0 left-0 right-0 banner-fade-bottom"></div>
</header><main id="rows" class="px-6 mt-6"></main><!-- PLAYER MODAL --><div id="modal" class="hidden fixed inset-0 bg-black/90 z-50 p-4"><button onclick="closePlayer()" class="absolute top-4 right-4 bg-red-600 px-3 py-1 rounded">Close</button>

<div id="player-container" class="w-full max-w-5xl mx-auto mt-12 bg-black">
<iframe id="player" class="w-full h-full" allowfullscreen frameborder="0"></iframe>
</div><h2 id="movie-title" class="text-2xl mt-4 text-center"></h2></div><script>

const API_KEY="2f7637ba9b3253a84483afa03480473a";
const BASE="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/original";

const requests={
trending:`/trending/all/week?api_key=${API_KEY}`,
top:`/movie/top_rated?api_key=${API_KEY}`,
action:`/discover/movie?api_key=${API_KEY}&with_genres=28`,
comedy:`/discover/movie?api_key=${API_KEY}&with_genres=35`,
horror:`/discover/movie?api_key=${API_KEY}&with_genres=27`
};

async function fetchData(url){
const r=await fetch(BASE+url);
const j=await r.json();
return j.results;
}

function createRow(title,movies){
const rows=document.getElementById("rows");

const row=document.createElement("div");
row.className="mb-8";

const h=document.createElement("h2");
h.textContent=title;
h.className="text-xl font-bold mb-2";

const list=document.createElement("div");
list.className="flex overflow-x-scroll scrollbar-hide";

movies.forEach(m=>{
if(!m.poster_path) return;

const img=document.createElement("img");
img.src=IMG+m.poster_path;
img.className="max-h-56 mr-3 cursor-pointer hover:scale-105 transition";

img.onclick=()=>playMovie(m);

list.appendChild(img);
});

row.appendChild(h);
row.appendChild(list);
rows.appendChild(row);
}

function playMovie(movie){

const id=movie.id;
const type=movie.first_air_date?"tv":"movie";

// FULL MOVIE PLAYER (vidsrc)
const url=`https://vidsrc.to/embed/${type}/${id}`;

document.getElementById("player").src=url;
document.getElementById("movie-title").textContent=movie.title||movie.name;

document.getElementById("modal").classList.remove("hidden");
}

function closePlayer(){
document.getElementById("modal").classList.add("hidden");
document.getElementById("player").src="";
}

(async()=>{

const trending=await fetchData(requests.trending);
const top=await fetchData(requests.top);
const action=await fetchData(requests.action);
const comedy=await fetchData(requests.comedy);
const horror=await fetchData(requests.horror);

createRow("Trending",trending);
createRow("Top Rated",top);
createRow("Action",action);
createRow("Comedy",comedy);
createRow("Horror",horror);

// banner
const b=trending[Math.floor(Math.random()*trending.length)];

document.getElementById("banner").style.backgroundImage=`url(${IMG}${b.backdrop_path})`;
document.getElementById("banner-title").textContent=b.title||b.name;
document.getElementById("banner-description").textContent=b.overview;

})();

</script></body>
</html>
