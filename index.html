<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZM FLIX | Elite Cinema 2026</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000000; --card-w: 155px; --card-h: 230px;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* NAVIGATION */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: 0.3s; }
        header.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: 28px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; }

        /* HERO */
        .hero { height: 75vh; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%); }
        .hero-body { position: relative; z-index: 10; max-width: 700px; }

        /* ROWS */
        .section { padding: 30px 0 0 5%; }
        .row { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0 30px; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }

        .card { min-width: var(--card-w); cursor: pointer; transition: 0.3s; border-radius: 8px; overflow: hidden; position: relative; border: 2px solid transparent; }
        .card:hover { transform: scale(1.05); border-color: white; }
        .card img { width: 100%; height: var(--card-h); object-fit: cover; }
        .card-name { position: absolute; bottom: 0; width: 100%; padding: 10px 5px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-size: 12px; font-weight: bold; text-align: center; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #111; position: sticky; top: 0; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn { padding: 14px 25px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 15px; }
        .btn-red { background: var(--red); color: white; width: 100%; margin-top: 15px; }
        .btn-gray { background: #333; color: white; width: 100%; margin-top: 10px; }

        /* EPISODES & SERVERS */
        .server-bar { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; }
        .server-btn { background: #222; color: #888; padding: 8px 15px; border-radius: 4px; font-size: 12px; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .server-btn.active { background: var(--red); color: white; border-color: var(--red); }

        .ep-list { padding: 0 5% 50px; }
        .ep-item { display: flex; gap: 15px; padding: 12px; background: #111; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #222; }
        .ep-item:hover { background: #1a1a1a; }
        .ep-thumb { width: 120px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        .ep-info b { font-size: 14px; display: block; margin-bottom: 4px; }
        .ep-info p { font-size: 12px; color: #777; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .close-btn { position: fixed; top: 15px; right: 15px; z-index: 3000; background: rgba(0,0,0,0.6); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div onclick="document.getElementById('searchView').style.display='block'" style="cursor:pointer; font-size: 22px;">🔍</div>
</header>

<div id="hero" class="hero"></div>

<div class="section"><h3>Top Philippines</h3><div class="row" id="ph-row"></div></div>
<div class="section"><h3>K-Drama</h3><div class="row" id="kdrama-row"></div></div>
<div class="section"><h3>Anime</h3><div class="row" id="anime-row"></div></div>

<div class="modal" id="playerModal">
    <button class="close-btn" onclick="closePlayer()">✕</button>
    <div class="video-wrap" id="vidArea">
        <iframe id="mainFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div style="padding: 20px 5%;">
        <div id="meta"></div>
        <div class="server-bar">
            <button class="server-btn active" onclick="switchSrv(1, this)">Server 1</button>
            <button class="server-btn" onclick="switchSrv(2, this)">Server 2 (Vidsrc VIP)</button>
            <button class="server-btn" onclick="switchSrv(3, this)">Server 3</button>
        </div>
        <div id="tvContainer" style="display:none;">
            <select id="seasonSel" onchange="loadEps()" style="background:#222; color:white; border:1px solid #444; padding:10px; width:100%; border-radius:4px; margin-bottom:15px;"></select>
            <div id="epList"></div>
        </div>
    </div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let curItem = null, curSrv = 1, curEp = { s: 1, e: 1 };

async function fetchTMDB(path) { return (await fetch(`https://api.themoviedb.org/3${path}${path.includes('?')?'&':'?'}api_key=${KEY}`)).json(); }

async function init() {
    const ph = await fetchTMDB('/trending/all/day?region=PH');
    setHero(ph.results[0]);
    renderRow('ph-row', ph.results);
    renderRow('kdrama-row', (await fetchTMDB('/discover/tv?with_original_language=ko')).results);
    renderRow('anime-row', (await fetchTMDB('/discover/tv?with_genres=16')).results);
}

function renderRow(id, data) {
    const row = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `<img src="${POSTER+i.poster_path}"><div class="card-name">${i.title || i.name}</div>`;
        c.onclick = () => openModal(i);
        row.appendChild(c);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + i.backdrop_path})`;
    h.innerHTML = `<div class="hero-overlay"></div><div class="hero-body"><h1>${i.title || i.name}</h1><p style="color:#ccc; margin:15px 0;">${i.overview.slice(0,100)}...</p><button class="btn btn-white" onclick='openModal(${JSON.stringify(i).replace(/'/g,"")})'>▶ Details</button></div>`;
}

async function openModal(i) {
    curItem = i; curEp = { s: 1, e: 1 };
    const m = document.getElementById('playerModal');
    m.style.display = "block"; document.body.style.overflow = "hidden";
    
    const type = i.first_air_date ? 'tv' : 'movie';
    const v = await fetchTMDB(`/${type}/${i.id}/videos`);
    const trailer = v.results.find(x => x.type === "Trailer");

    document.getElementById('meta').innerHTML = `
        <h2 style="margin:0;">${i.title || i.name}</h2>
        <p style="color:#aaa; font-size:14px; margin:10px 0;">${i.overview}</p>
        <button class="btn btn-red" onclick="watch(true)">▶ WATCH FULL CONTENT</button>
        ${trailer ? `<button class="btn btn-gray" onclick="playTrailer('${trailer.key}')">📺 Watch Trailer</button>` : ''}
    `;

    if(type === 'tv') {
        const d = await fetchTMDB(`/tv/${i.id}`);
        const sel = document.getElementById('seasonSel');
        document.getElementById('tvContainer').style.display = 'block';
        sel.innerHTML = d.seasons.filter(s=>s.season_number>0).map(s=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
        loadEps();
    } else document.getElementById('tvContainer').style.display = 'none';
}

async function loadEps() {
    const s = document.getElementById('seasonSel').value || 1;
    const d = await fetchTMDB(`/tv/${curItem.id}/season/${s}`);
    const list = document.getElementById('epList');
    list.innerHTML = d.episodes.map(e => `
        <div class="ep-item" onclick="playEp(${s},${e.episode_number})">
            <img class="ep-thumb" src="${e.still_path ? POSTER+e.still_path : ''}">
            <div class="ep-info"><b>${e.episode_number}. ${e.name}</b><p>${e.overview || 'No info.'}</p></div>
        </div>
    `).join('');
}

function playTrailer(key) { document.getElementById('mainFrame').src = `https://www.youtube.com/embed/${key}?autoplay=1`; }

function playEp(s, e) { curEp = { s, e }; watch(true); }

function switchSrv(n, btn) {
    curSrv = n;
    document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(document.getElementById('mainFrame').src.includes('vidsync') || document.getElementById('mainFrame').src.includes('vidsrc')) watch(true);
}

async function watch(forceFull = false) {
    const f = document.getElementById('mainFrame');
    const type = curItem.first_air_date ? 'tv' : 'movie';
    const { s, e } = curEp;
    
    if(forceFull) {
        const area = document.getElementById('vidArea');
        if (area.requestFullscreen) await area.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(()=>{});
    }

    let url = "";
    if(curSrv === 1) url = `https://vidsync.xyz/embed/${type}/${curItem.id}${type==='tv'?`/${s}/${e}`:''}`;
    else if(curSrv === 2) url = `https://vidsrc.cc/v2/embed/${type}/${curItem.id}${type==='tv'?`/${s}/${e}`:''}`;
    else url = `https://multiembed.mov/?video_id=${curItem.id}&tmdb=1${type==='tv'?`&s=${s}&e=${e}`:''}`;

    f.src = url;
}

function closePlayer() {
    document.getElementById('playerModal').style.display='none';
    document.getElementById('mainFrame').src='';
    document.body.style.overflow='auto';
    if(document.fullscreenElement) document.exitFullscreen();
}

window.onscroll = () => { document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50); };
init();
</script>
</body>
</html>
