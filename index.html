<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZM FLIX | Premium Library</title>
    <style>
        :root { 
            --red: #E50914; --bg: #000000; --card-w: 155px; --card-h: 230px;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Responsive scaling for PC/TV */
        @media (min-width: 1200px) { :root { --card-w: 190px; --card-h: 280px; } }

        body { margin: 0; background: var(--bg); color: white; font-family: var(--font-main); overflow-x: hidden; }

        /* --- LOADER --- */
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.6s; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(229, 9, 20, 0.1); border-top: 4px solid var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- NAVIGATION --- */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: 0.3s; }
        header.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
        .logo { color: var(--red); font-size: 28px; font-weight: 900; letter-spacing: -1.5px; cursor: pointer; }

        /* --- HERO --- */
        .hero { height: 75vh; background-size: cover; background-position: center top; position: relative; display: flex; align-items: flex-end; padding: 0 5% 60px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 80%); }
        .hero-body { position: relative; z-index: 10; max-width: 700px; }
        .hero-body h1 { font-size: clamp(2.5rem, 6vw, 3.5rem); margin: 0; font-weight: 800; }

        /* --- ROWS & CATEGORIES --- */
        .section { padding: 30px 0 0 5%; }
        .section h3 { font-size: 1.4rem; margin-bottom: 10px; color: #e5e5e5; }
        .row { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0 30px; scroll-behavior: smooth; }
        .row::-webkit-scrollbar { display: none; }

        .card { 
            min-width: var(--card-w); width: var(--card-w); cursor: pointer; border-radius: 4px; 
            transition: 0.3s; outline: none; border: 3px solid transparent; 
        }
        .card:focus, .card:hover { transform: scale(1.08); border-color: white; z-index: 10; }
        .card-img { width: 100%; height: var(--card-h); object-fit: cover; border-radius: 4px; background: #111; }
        .card-name { font-size: 13px; font-weight: 600; margin-top: 8px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card:focus .card-name, .card:hover .card-name { color: white; }

        /* --- MODAL (PC/TV COMPACT PLAYER) --- */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .modal-content { display: flex; flex-direction: column; width: 100%; }

        @media (min-width: 1024px) {
            .modal-content { 
                flex-direction: row-reverse; padding: 100px 5%; gap: 50px; 
                max-width: 1400px; margin: 0 auto; align-items: flex-start;
            }
            .video-wrap { 
                width: 380px !important; flex-shrink: 0; position: sticky; top: 100px; 
                border-radius: 8px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.9);
            }
            .info-wrap { flex: 1; padding: 0 !important; }
        }

        .video-wrap { width: 100%; aspect-ratio: 16/9; background: #111; }
        iframe { width: 100%; height: 100%; border: none; }
        .info-wrap { padding: 25px 5%; }

        .btn { padding: 14px 30px; border-radius: 4px; font-weight: bold; border: 2px solid transparent; cursor: pointer; font-size: 17px; display: inline-flex; align-items: center; gap: 10px; outline: none; transition: 0.2s; }
        .btn-white { background: white; color: black; }
        .btn-red { background: var(--red); color: white; width: 100%; max-width: 350px; justify-content: center; margin: 20px 0; }
        .btn:focus { border-color: white; transform: scale(1.05); }

        /* EPISODES */
        .season-sel { background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 4px; margin-bottom: 20px; outline: none; font-size: 16px; }
        .ep-card { display: flex; gap: 15px; padding: 12px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; outline: none; align-items: center; transition: 0.2s; }
        .ep-card:focus { background: #1a1a1a; border-color: white; }
        .ep-thumb { width: 130px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }

        .close-btn { position: fixed; top: 25px; right: 25px; z-index: 3000; background: rgba(0,0,0,0.6); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 22px; outline: none; }
        .close-btn:focus { background: var(--red); }

        #searchView { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; padding: 100px 5%; overflow-y: auto; }
        .search-box { width: 100%; max-width: 500px; display: block; margin: 0 auto 30px; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 50px; outline: none; font-size: 18px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header id="nav">
    <div class="logo" onclick="location.reload()">NZM FLIX</div>
    <div onclick="toggleSearch()" style="cursor:pointer; font-size: 24px; padding: 10px;">🔍</div>
</header>

<main id="home">
    <div id="hero" class="hero"></div>
    <div class="section"><h3>Top Philippines</h3><div class="row" id="ph-row"></div></div>
    <div class="section"><h3>Trending Now</h3><div class="row" id="trending-row"></div></div>
    <div class="section"><h3>Action Thrillers</h3><div class="row" id="action-row"></div></div>
    <div class="section"><h3>K-Drama</h3><div class="row" id="kdrama-row"></div></div>
    <div class="section"><h3>Horror Night</h3><div class="row" id="horror-row"></div></div>
    <div class="section"><h3>Anime Universe</h3><div class="row" id="anime-row"></div></div>
    <div class="section"><h3>Sci-Fi & Fantasy</h3><div class="row" id="scifi-row"></div></div>
    <div class="section"><h3>Family & Kids</h3><div class="row" id="kids-row"></div></div>
    <div class="section"><h3>Asian Cinema</h3><div class="row" id="asian-row"></div></div>
    <div class="section"><h3>Classics</h3><div class="row" id="classic-row"></div></div>
</main>

<div class="modal" id="playerModal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-content">
        <div class="video-wrap" id="vidArea">
            <iframe id="mainFrame" allow="autoplay; fullscreen"></iframe>
        </div>
        <div class="info-wrap">
            <div id="metaContent"></div>
            <div id="tvUI" style="display:none;">
                <select id="seasonSelect" class="season-sel" onchange="loadEpisodes()"></select>
                <div id="episodeList"></div>
            </div>
        </div>
    </div>
</div>

<div id="searchView">
    <input type="text" id="searchInput" class="search-box" placeholder="Movies, TV, Genres...">
    <div class="row" style="flex-wrap: wrap; justify-content: center; gap: 20px;" id="searchRes"></div>
</div>

<script>
const KEY = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const POSTER = "https://image.tmdb.org/t/p/w500";
let activeItem = null;

async function api(path) {
    const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${KEY}`);
    return r.json();
}

async function init() {
    // Hero & Philippines
    const phData = await api('/trending/all/day?region=PH');
    setHero(phData.results[0]);
    renderRow('ph-row', phData.results);

    // Trending
    renderRow('trending-row', (await api('/trending/all/week')).results);
    
    // Categories using TMDB Genre IDs
    renderRow('action-row', (await api('/discover/movie?with_genres=28')).results);
    renderRow('kdrama-row', (await api('/discover/tv?with_original_language=ko&with_genres=18')).results);
    renderRow('horror-row', (await api('/discover/movie?with_genres=27')).results);
    renderRow('anime-row', (await api('/discover/tv?with_genres=16&with_keywords=210024')).results);
    renderRow('scifi-row', (await api('/discover/movie?with_genres=878,14')).results);
    renderRow('kids-row', (await api('/discover/movie?with_genres=16,10751')).results);
    renderRow('asian-row', (await api('/discover/tv?with_original_language=zh|th')).results);
    renderRow('classic-row', (await api('/discover/movie?sort_by=release_date.asc&vote_count.gte=1000')).results);

    setTimeout(() => {
        document.getElementById('loader').style.opacity = "0";
        setTimeout(() => document.getElementById('loader').style.display = "none", 600);
    }, 1000);
}

function renderRow(id, data) {
    const container = document.getElementById(id);
    data.forEach(i => {
        if(!i.poster_path) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.tabIndex = "0";
        const title = i.title || i.name;
        card.innerHTML = `<img class="card-img" src="${POSTER + i.poster_path}"><div class="card-name">${title}</div>`;
        card.onclick = () => openModal(i);
        card.onkeydown = (e) => { if(e.key === "Enter") openModal(i); };
        container.appendChild(card);
    });
}

function setHero(i) {
    const h = document.getElementById('hero');
    h.style.backgroundImage = `url(${IMG + (i.backdrop_path || i.poster_path)})`;
    h.innerHTML = `<div class="hero-overlay"></div>
    <div class="hero-body">
        <h1>${i.title || i.name}</h1>
        <p style="color:#ccc; margin: 15px 0; font-size:17px;">${i.overview.slice(0, 160)}...</p>
        <button class="btn btn-white" onclick='openModal(${JSON.stringify(i).replace(/'/g,"")})'>▶ Play Trailer</button>
    </div>`;
}

async function openModal(i) {
    activeItem = i;
    const m = document.getElementById('playerModal');
    const f = document.getElementById('mainFrame');
    m.style.display = "block";
    document.body.style.overflow = "hidden";

    const type = i.first_air_date ? 'tv' : 'movie';
    const videos = await api(`/${type}/${i.id}/videos`);
    const trailer = videos.results.find(v => v.type === "Trailer") || videos.results[0];
    if(trailer) f.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;

    document.getElementById('metaContent').innerHTML = `
        <h2 style="font-size: 2.8rem; margin:0 0 10px;">${i.title || i.name}</h2>
        <div style="color:#46d369; font-weight:bold; margin-bottom:20px;">NZM Original • 2026</div>
        <p style="color:#aaa; line-height:1.6; font-size:17px; margin-bottom:30px;">${i.overview}</p>
        <button class="btn btn-red" id="fullBtn" onclick="watchFull(${i.id}, '${type}')">▶ WATCH NOW FULL CONTENT</button>
    `;

    if(type === 'tv') {
        document.getElementById('tvUI').style.display = 'block';
        const d = await api(`/tv/${i.id}`);
        const sel = document.getElementById('seasonSelect');
        sel.innerHTML = "";
        d.seasons.forEach(s => { if(s.season_number > 0) sel.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`; });
        loadEpisodes();
    } else {
        document.getElementById('tvUI').style.display = 'none';
    }
    document.getElementById('fullBtn').focus();
}

async function loadEpisodes() {
    const s = document.getElementById('seasonSelect').value || 1;
    const d = await api(`/tv/${activeItem.id}/season/${s}`);
    const list = document.getElementById('episodeList');
    list.innerHTML = "";
    d.episodes.forEach(e => {
        const div = document.createElement('div');
        div.className = 'ep-card';
        div.tabIndex = "0";
        div.onclick = () => watchFull(activeItem.id, 'tv', s, e.episode_number);
        div.onkeydown = (ev) => { if(ev.key === "Enter") watchFull(activeItem.id, 'tv', s, e.episode_number); };
        div.innerHTML = `<img class="ep-thumb" src="${e.still_path ? POSTER + e.still_path : ''}">
            <div><b>${e.episode_number}. ${e.name}</b></div>`;
        list.appendChild(div);
    });
}

function watchFull(id, type, s=1, e=1) {
    const f = document.getElementById('mainFrame');
    const area = document.getElementById('vidArea');
    f.src = type === 'tv' ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`;
    if (area.requestFullscreen) area.requestFullscreen();
}

function closeModal() {
    document.getElementById('playerModal').style.display = "none";
    document.getElementById('mainFrame').src = "";
    document.body.style.overflow = "auto";
}

function toggleSearch() {
    const s = document.getElementById('searchView');
    s.style.display = s.style.display === 'block' ? 'none' : 'block';
    if(s.style.display === 'block') document.getElementById('searchInput').focus();
}

document.getElementById('searchInput').oninput = async (e) => {
    const q = e.target.value;
    if(q.length > 2) {
        const d = await api(`/search/multi?query=${q}`);
        const res = document.getElementById('searchRes');
        res.innerHTML = "";
        d.results.forEach(i => {
            if(!i.poster_path) return;
            const c = document.createElement('div');
            c.className = 'card';
            c.tabIndex = "0";
            c.innerHTML = `<img class="card-img" src="${POSTER + i.poster_path}"><div class="card-name">${i.title || i.name}</div>`;
            c.onclick = () => { toggleSearch(); openModal(i); };
            res.appendChild(c);
        });
    }
};

window.onscroll = () => {
    const n = document.getElementById('nav');
    window.scrollY > 50 ? n.classList.add('scrolled') : n.classList.remove('scrolled');
};

init();
</script>
</body>
</html>
