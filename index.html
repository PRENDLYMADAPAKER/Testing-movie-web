<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZM FLIX | Premium</title>

    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
            --card-width: 280px;
            --card-height: 158px;
            --transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
        }

        body {
            margin: 0; background: var(--netflix-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white; overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 4%; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            transition: 0.4s;
        }
        header.scrolled { background: #000; padding: 12px 4%; }
        header h2 { color: var(--netflix-red); margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1px; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .search-box {
            position: relative; display: flex; align-items: center;
            background: rgba(0,0,0,0.75); border: 1px solid #fff;
            padding: 5px 10px; border-radius: 2px;
        }
        #search {
            background: transparent; border: none; color: white;
            outline: none; width: 150px; transition: width 0.3s;
        }
        #search:focus { width: 250px; }

        /* --- HERO BILLBOARD --- */
        .hero {
            height: 85vh; display: flex; align-items: center; padding: 0 4%;
            background-size: cover; background-position: center 20%; position: relative;
        }
        .hero::after {
            content: ""; position: absolute; bottom: 0; left: 0; right: 0;
            height: 40%; background: linear-gradient(to top, var(--netflix-black), transparent);
        }
        .heroContent { position: relative; z-index: 2; max-width: 650px; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .hero p { font-size: 1.2rem; line-height: 1.4; margin: 25px 0; text-shadow: 1px 1px 10px #000; }

        .btn {
            padding: 12px 30px; border-radius: 4px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 10px;
        }
        .play-btn { background: white; color: black; transition: 0.2s; }
        .play-btn:hover { background: rgba(255,255,255,0.85); }
        .info-btn { background: rgba(109, 109, 110, 0.7); color: white; margin-left: 10px; }

        /* --- SEARCH RESULTS OVERLAY --- */
        #searchOverlay {
            position: fixed; top: 70px; left: 0; width: 100%; height: 100%;
            background: var(--netflix-black); z-index: 900; display: none;
            padding: 40px 4%; overflow-y: auto; box-sizing: border-box;
        }
        .search-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; margin-top: 30px;
        }

        /* --- TOP 10 PH DESIGN --- */
        .top10-card { position: relative; min-width: 300px; height: 180px; display: flex; align-items: flex-end; }
        .top10-num {
            font-size: 200px; font-weight: 900; line-height: 0.7; margin-right: -40px;
            color: var(--netflix-black); -webkit-text-stroke: 3px #555; 
            position: relative; z-index: 1; user-select: none;
        }

        /* --- ROWS --- */
        .section { padding: 25px 0 10px 4%; }
        .section h3 { font-size: 1.4rem; margin-bottom: 5px; color: #e5e5e5; }
        .row { display: flex; gap: 10px; overflow-x: auto; padding: 20px 0; scroll-behavior: smooth; }
        .row::-webkit-scrollbar { display: none; }

        .card {
            min-width: var(--card-width); height: var(--card-height);
            background: #222; border-radius: 4px; overflow: hidden;
            transition: var(--transition); cursor: pointer; position: relative;
        }
        .card:hover { transform: scale(1.3); z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- PLAYER MODAL --- */
        .player {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--netflix-black); z-index: 2000; display: none; overflow-y: auto;
        }
        .videoBox { width: 100%; padding-top: 56.25%; background: black; position: relative; }
        .videoBox iframe { position: absolute; top: 0; width: 100%; height: 100%; border: none; }
        .close-player {
            position: absolute; top: 25px; left: 25px; z-index: 2001;
            background: rgba(0,0,0,0.5); color: white; border: none;
            width: 45px; height: 45px; border-radius: 50%; font-size: 24px; cursor: pointer;
        }

        .details { padding: 40px 4%; max-width: 1000px; }
        .details h2 { font-size: 3rem; margin: 0; }
        .meta { color: #46d369; font-weight: bold; margin: 15px 0; }
        .episode {
            display: flex; gap: 20px; background: #181818; padding: 15px;
            margin-bottom: 10px; border-radius: 4px; cursor: pointer; border-bottom: 1px solid #333;
        }
        .episode:hover { background: #333; }
        .episode img { width: 180px; height: 100px; object-fit: cover; border-radius: 4px; }

        @media(max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .card { min-width: 180px; height: 101px; }
            .top10-num { font-size: 130px; margin-right: -25px; }
            .top10-card { min-width: 220px; }
        }
    </style>
</head>
<body>

<header id="nav">
    <h2>NZM FLIX</h2>
    <div class="nav-right">
        <div class="search-box">
            <span style="font-size:14px; margin-right:5px;">🔍</span>
            <input id="search" placeholder="Titles, people, genres" autocomplete="off">
        </div>
    </div>
</header>

<div id="main-content">
    <div class="hero" id="hero"></div>

    <div class="section">
        <h3>Top 10 in Philippines Today</h3>
        <div class="row" id="top10"></div>
    </div>

    <div class="section">
        <h3>Trending Anime</h3>
        <div class="row" id="anime"></div>
    </div>

    <div class="section">
        <h3>Binge-worthy K-Dramas</h3>
        <div class="row" id="kdrama"></div>
    </div>

    <div class="section">
        <h3>Asian Action Excellence</h3>
        <div class="row" id="asianAction"></div>
    </div>

    <div class="section">
        <h3>Blockbuster Movies</h3>
        <div class="row" id="movies"></div>
    </div>
</div>

<div id="searchOverlay">
    <h2 id="searchTitle">Search Results</h2>
    <div class="search-grid" id="searchGrid"></div>
</div>

<div class="player" id="player">
    <div class="videoBox">
        <button class="close-player" onclick="closePlayer()">✕</button>
        <iframe id="frame" allowfullscreen allow="autoplay"></iframe>
    </div>
    <div class="details">
        <div id="playerDetails"></div>
        <div style="margin-top:30px;">
            <select id="season" style="background:#333;color:white;padding:12px;width:200px;border:none;margin-bottom:20px;"></select>
            <div id="episodes"></div>
        </div>
    </div>
</div>

<script>
const API = "2f7637ba9b3253a84483afa03480473a";
const IMG = "https://image.tmdb.org/t/p/original";
const THUMB = "https://image.tmdb.org/t/p/w500";

window.onscroll = () => {
    const nav = document.getElementById('nav');
    window.scrollY > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
};

async function get(u) { return (await fetch(u)).json(); }

async function init() {
    // Top 10 PH (Trending)
    const trend = await get(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}&region=PH`);
    setHero(trend.results[0]);
    displayTop10(trend.results.slice(0, 10));

    // Anime (Animation Genre 16 + Japan)
    const anime = await get(`https://api.themoviedb.org/3/discover/tv?api_key=${API}&with_genres=16&with_original_language=ja&sort_by=popularity.desc`);
    display(anime.results, "anime");

    // K-Drama (Drama Genre 18 + Korea)
    const kdrama = await get(`https://api.themoviedb.org/3/discover/tv?api_key=${API}&with_genres=18&with_original_language=ko`);
    display(kdrama.results, "kdrama");

    // Asian Action (Action 28 + PH/KR/JP/HK)
    const asian = await get(`https://api.themoviedb.org/3/discover/movie?api_key=${API}&with_genres=28&with_origin_country=PH|KR|JP|HK`);
    display(asian.results, "asianAction");

    const mov = await get(`https://api.themoviedb.org/3/movie/popular?api_key=${API}`);
    display(mov.results, "movies");
}

function setHero(i) {
    const h = document.getElementById("hero");
    h.style.backgroundImage = `linear-gradient(to right, #141414 5%, transparent 80%), url(${IMG + i.backdrop_path})`;
    h.innerHTML = `
        <div class="heroContent">
            <h1>${i.title || i.name}</h1>
            <p>${i.overview.slice(0, 200)}...</p>
            <button class="btn play-btn" onclick='playNow(${i.id}, "${i.media_type}")'>▶ Play</button>
            <button class="btn info-btn" onclick='openPlayer(${JSON.stringify(i).replace(/'/g, "&apos;")})'>ⓘ More Info</button>
        </div>`;
}

function displayTop10(list) {
    const row = document.getElementById("top10");
    list.forEach((i, idx) => {
        const div = document.createElement("div");
        div.className = "top10-card";
        div.innerHTML = `
            <span class="top10-num">${idx + 1}</span>
            <div class="card" onclick='openPlayer(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
                <img src="${THUMB + (i.backdrop_path || i.poster_path)}">
            </div>`;
        row.appendChild(div);
    });
}

function display(list, id) {
    const row = document.getElementById(id);
    list.forEach(i => {
        if(!i.backdrop_path) return;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img src="${THUMB + i.backdrop_path}" loading="lazy">`;
        card.onclick = () => openPlayer(i);
        row.appendChild(card);
    });
}

// --- DYNAMIC SEARCH LOGIC ---
document.getElementById("search").addEventListener("input", async (e) => {
    const q = e.target.value;
    const overlay = document.getElementById("searchOverlay");
    const grid = document.getElementById("searchGrid");
    
    if (q.length > 2) {
        overlay.style.display = "block";
        const data = await get(`https://api.themoviedb.org/3/search/multi?api_key=${API}&query=${q}`);
        grid.innerHTML = "";
        data.results.forEach(i => {
            if (!i.backdrop_path && !i.poster_path) return;
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `<img src="${THUMB + (i.backdrop_path || i.poster_path)}">`;
            div.onclick = () => { overlay.style.display = "none"; openPlayer(i); };
            grid.appendChild(div);
        });
    } else {
        overlay.style.display = "none";
    }
});

function openPlayer(i) {
    const p = document.getElementById("player");
    p.style.display = "block";
    document.body.style.overflow = "hidden";
    
    document.getElementById("playerDetails").innerHTML = `
        <h2>${i.title || i.name}</h2>
        <div class="meta">${Math.round(i.vote_average*10)}% Match • ${i.release_date || i.first_air_date || ""}</div>
        <p style="font-size:1.2rem; line-height:1.6; color:#ddd;">${i.overview}</p>`;

    const type = i.first_air_date ? 'tv' : 'movie';
    if(type === 'tv') loadTV(i.id);
    else {
        document.getElementById("season").style.display = "none";
        document.getElementById("episodes").innerHTML = "";
        playNow(i.id, 'movie');
    }
}

function playNow(id, type, s=1, e=1) {
    const frame = document.getElementById("frame");
    // Priority servers as requested
    const servers = [
        type === "tv" ? `https://vidsync.xyz/embed/tv/${id}/${s}/${e}?autoPlay=true` : `https://vidsync.xyz/embed/movie/${id}?autoPlay=true`,
        type === "tv" ? `https://vidsrc.to/embed/tv/${id}/${s}/${e}` : `https://vidsrc.to/embed/movie/${id}`
    ];
    frame.src = servers[0];
    window.scrollTo(0,0);
}

async function loadTV(id) {
    const data = await get(`https://api.themoviedb.org/3/tv/${id}?api_key=${API}`);
    const sea = document.getElementById("season");
    sea.style.display = "block"; sea.innerHTML = "";
    data.seasons.forEach(s => {
        if(s.season_number === 0) return;
        const o = document.createElement("option");
        o.value = s.season_number; o.text = `Season ${s.season_number}`;
        sea.appendChild(o);
    });
    sea.onchange = () => loadEpisodes(id, sea.value);
    loadEpisodes(id, 1);
}

async function loadEpisodes(id, sNum) {
    const data = await get(`https://api.themoviedb.org/3/tv/${id}/season/${sNum}?api_key=${API}`);
    const box = document.getElementById("episodes");
    box.innerHTML = "";
    data.episodes.forEach(e => {
        const d = document.createElement("div");
        d.className = "episode";
        d.onclick = () => playNow(id, 'tv', sNum, e.episode_number);
        d.innerHTML = `
            <img src="${THUMB + e.still_path}">
            <div>
                <b style="font-size:1.1rem;">${e.episode_number}. ${e.name}</b>
                <p style="font-size:13px; color:#999; margin-top:8px;">${e.overview.slice(0,150)}...</p>
            </div>`;
        box.appendChild(d);
    });
}

function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
    document.body.style.overflow = "auto";
}

init();
</script>
</body>
  </html>
